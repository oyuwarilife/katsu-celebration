<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff8fa"/>
      <stop offset="100%" style="stop-color:#ffd4e5"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Paw print icon -->
  <g transform="translate(600,200)">
    <ellipse cx="0" cy="24" rx="44" ry="36" fill="#ff6b9d"/>
    <ellipse cx="-44" cy="-24" rx="20" ry="24" fill="#ff6b9d" transform="rotate(-15,-44,-24)"/>
    <ellipse cx="-12" cy="-48" rx="18" ry="22" fill="#ff6b9d" transform="rotate(-5,-12,-48)"/>
    <ellipse cx="20" cy="-48" rx="18" ry="22" fill="#ff6b9d" transform="rotate(5,20,-48)"/>
    <ellipse cx="48" cy="-24" rx="20" ry="24" fill="#ff6b9d" transform="rotate(15,48,-24)"/>
  </g>
  <!-- Title -->
  <text x="600" y="340" text-anchor="middle" font-family="sans-serif" font-size="64" font-weight="900" fill="#4a3347">ポモ活スタンプシート</text>
  <!-- Subtitle -->
  <text x="600" y="410" text-anchor="middle" font-family="sans-serif" font-size="32" fill="#888">朝活・昼活・夜活の参加記録を</text>
  <text x="600" y="455" text-anchor="middle" font-family="sans-serif" font-size="32" fill="#888">スタンプカードで残そう！</text>
  <!-- Activity icons -->
  <text x="400" y="550" text-anchor="middle" font-size="48">☀️</text>
  <text x="600" y="550" text-anchor="middle" font-size="48">🍙</text>
  <text x="800" y="550" text-anchor="middle" font-size="48">🌙</text>
  <text x="400" y="590" text-anchor="middle" font-family="sans-serif" font-size="24" font-weight="700" fill="#FF9A76">朝活</text>
  <text x="600" y="590" text-anchor="middle" font-family="sans-serif" font-size="24" font-weight="700" fill="#4ECDC4">昼活</text>
  <text x="800" y="590" text-anchor="middle" font-family="sans-serif" font-size="24" font-weight="700" fill="#7B68EE">夜活</text>
</svg>
