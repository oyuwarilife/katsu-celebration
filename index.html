<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>おつかれさま! - 朝活・昼活・夜活</title>
<style>
  :root {
    --primary: #ff6b9d;
    --primary-light: #ffd4e5;
    --accent: #ffc107;
    --bg: #fff8fa;
    --text: #4a3347;
    --shadow: 0 8px 32px rgba(255,107,157,0.15);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Segoe UI', 'Hiragino Sans', 'Meiryo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .container {
    text-align: center;
    padding: 2rem;
    max-width: 440px;
    width: 100%;
  }

  /* Avatar */
  .avatar-area {
    width: 130px;
    height: 130px;
    margin: 0 auto 1.5rem;
    cursor: pointer;
  }
  .avatar-area input { display: none; }
  .avatar-circle {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    border: 4px solid var(--primary);
    background: var(--primary-light);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    transition: transform 0.3s, box-shadow 0.3s;
    box-shadow: var(--shadow);
  }
  .avatar-circle:hover {
    transform: scale(1.05);
    box-shadow: 0 12px 40px rgba(255,107,157,0.25);
  }
  .avatar-circle img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .avatar-placeholder {
    font-size: 0.8rem;
    color: var(--primary);
    line-height: 1.4;
  }

  h1 {
    font-size: 1.6rem;
    margin-bottom: 0.3rem;
    color: var(--primary);
  }
  .subtitle {
    font-size: 0.85rem;
    color: #aaa;
    margin-bottom: 2rem;
  }

  /* Activity selector */
  .activity-selector {
    display: flex;
    gap: 0.6rem;
    justify-content: center;
    margin-bottom: 2rem;
  }
  .act-btn {
    border: 2.5px solid var(--primary-light);
    background: #fff;
    color: var(--text);
    border-radius: 16px;
    padding: 12px 20px;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.25s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    min-width: 100px;
  }
  .act-btn .act-icon { font-size: 1.6rem; }
  .act-btn .act-label { font-size: 0.85rem; font-weight: 600; }
  .act-btn:hover { border-color: var(--primary); transform: translateY(-2px); }
  .act-btn.active {
    background: var(--primary);
    color: #fff;
    border-color: var(--primary);
    box-shadow: 0 4px 16px rgba(255,107,157,0.35);
  }

  /* Complete button */
  .btn {
    border: none;
    border-radius: 50px;
    padding: 16px 52px;
    font-size: 1.15rem;
    cursor: pointer;
    transition: all 0.3s;
    font-weight: 700;
    letter-spacing: 0.05em;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--primary), #ff8fab);
    color: #fff;
    box-shadow: 0 4px 20px rgba(255,107,157,0.4);
  }
  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 28px rgba(255,107,157,0.5);
  }
  .btn-share {
    background: linear-gradient(135deg, #333, #000);
    color: #fff;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    margin-top: 0.8rem;
    padding: 12px 36px;
    font-size: 0.95rem;
  }
  .btn-share:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 28px rgba(0,0,0,0.4);
  }
  .btn-download {
    background: linear-gradient(135deg, #4ecdc4, #44b09e);
    color: #fff;
    box-shadow: 0 4px 20px rgba(78,205,196,0.4);
    margin-top: 0.5rem;
    padding: 12px 36px;
    font-size: 0.95rem;
  }
  .btn-download:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 28px rgba(78,205,196,0.5);
  }
  .btn-back {
    background: #f0f0f0;
    color: #999;
    padding: 12px 36px;
    font-size: 0.9rem;
    margin-top: 0.5rem;
  }
  .btn-back:hover { background: #e0e0e0; color: #666; }
  .share-note {
    font-size: 0.75rem;
    color: #bbb;
    margin-top: 0.6rem;
    line-height: 1.5;
  }

  /* Stats bar */
  .stats {
    display: flex;
    gap: 1.2rem;
    justify-content: center;
    margin-top: 2.5rem;
    font-size: 0.8rem;
    color: #bbb;
  }
  .stats span { font-weight: 700; color: var(--primary); }

  /* Celebration overlay */
  .celebration {
    position: fixed;
    inset: 0;
    background: rgba(255,248,250,0.97);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    animation: fadeIn 0.5s;
    padding: 2rem;
  }
  .celebration.show { display: flex; }
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

  .celebration .avatar-celebrate {
    width: 150px;
    height: 150px;
    border-radius: 50%;
    border: 5px solid var(--accent);
    overflow: hidden;
    margin-bottom: 1.2rem;
    animation: bounceIn 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55);
    box-shadow: 0 0 40px rgba(255,193,7,0.4), 0 0 80px rgba(255,107,157,0.2);
  }
  .celebration .avatar-celebrate img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  @keyframes bounceIn {
    0% { transform: scale(0); }
    60% { transform: scale(1.2); }
    100% { transform: scale(1); }
  }

  .celebration h2 {
    font-size: 2rem;
    color: var(--primary);
    margin-bottom: 0.4rem;
    animation: slideUp 0.5s 0.3s both;
  }
  .celebration .celeb-activity {
    font-size: 1rem;
    color: var(--accent);
    font-weight: 700;
    margin-bottom: 0.8rem;
    animation: slideUp 0.5s 0.4s both;
  }
  .celebration .msg {
    font-size: 1.05rem;
    color: var(--text);
    margin-bottom: 0.3rem;
    animation: slideUp 0.5s 0.5s both;
    max-width: 340px;
    line-height: 1.8;
    white-space: pre-line;
  }
  .celebration .streak-info {
    font-size: 0.9rem;
    color: var(--primary);
    margin: 1rem 0 1.5rem;
    animation: slideUp 0.5s 0.7s both;
  }
  .celebration .btn-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    animation: slideUp 0.5s 0.9s both;
  }
  @keyframes slideUp {
    from { opacity:0; transform:translateY(20px); }
    to { opacity:1; transform:translateY(0); }
  }

  /* Confetti canvas */
  #confetti {
    position: fixed;
    inset: 0;
    z-index: 101;
    pointer-events: none;
  }

  /* Sound toggle */
  .sound-toggle {
    position: fixed;
    top: 1rem;
    right: 1rem;
    background: none;
    border: none;
    font-size: 1.5rem;
    cursor: pointer;
    opacity: 0.5;
    transition: opacity 0.2s;
    z-index: 10;
  }
  .sound-toggle:hover { opacity: 1; }

  /* Hidden canvas for image generation */
  #cardCanvas { display: none; }
</style>
</head>
<body>

<button class="sound-toggle" id="soundToggle" title="Sound on/off">&#x1f50a;</button>

<div class="container" id="mainScreen">
  <div class="avatar-area" onclick="document.getElementById('avatarInput').click()">
    <div class="avatar-circle" id="avatarCircle">
      <div class="avatar-placeholder" id="avatarPlaceholder">
        tap to<br>upload icon
      </div>
    </div>
    <input type="file" id="avatarInput" accept="image/*">
  </div>

  <h1>Today's Activity</h1>
  <p class="subtitle">Pick your activity & celebrate yourself</p>

  <div class="activity-selector">
    <button class="act-btn" data-type="morning" onclick="selectActivity(this)">
      <span class="act-icon">&#x1f305;</span>
      <span class="act-label">朝活</span>
    </button>
    <button class="act-btn" data-type="afternoon" onclick="selectActivity(this)">
      <span class="act-icon">&#x2600;&#xfe0f;</span>
      <span class="act-label">昼活</span>
    </button>
    <button class="act-btn" data-type="evening" onclick="selectActivity(this)">
      <span class="act-icon">&#x1f319;</span>
      <span class="act-label">夜活</span>
    </button>
  </div>

  <button class="btn btn-primary" id="completeBtn" onclick="completeActivity()" disabled style="opacity:0.5">
    おつかれさま!
  </button>

  <div class="stats">
    <div>Today <span id="todayCount">0</span></div>
    <div>Total <span id="totalCount">0</span></div>
    <div>Streak <span id="streakCount">0</span> days</div>
  </div>
</div>

<!-- Celebration -->
<div class="celebration" id="celebration">
  <div class="avatar-celebrate" id="celebAvatar"></div>
  <h2 id="celebTitle"></h2>
  <div class="celeb-activity" id="celebActivity"></div>
  <div class="msg" id="celebMsg"></div>
  <div class="streak-info" id="celebStreak"></div>
  <div class="btn-group">
    <button class="btn btn-share" onclick="shareToThreads()">Threads share</button>
    <button class="btn btn-download" onclick="downloadCard()">save image</button>
    <button class="btn btn-back" onclick="closeCelebration()">back</button>
    <div class="share-note" id="shareNote"></div>
  </div>
</div>

<canvas id="confetti"></canvas>
<canvas id="cardCanvas" width="1080" height="1080"></canvas>

<script>
// --- State ---
let selectedType = null;
let avatarDataUrl = null;
let avatarImg = null;
let soundOn = true;
let lastCelebData = {};

const activityConfig = {
  morning: {
    label: '朝活',
    icon: '\u{1F305}',
    color1: '#FF9A76', color2: '#FFECD2',
    gradStart: '#ff9a76', gradEnd: '#ffecd2',
    textColor: '#8B4513',
  },
  afternoon: {
    label: '昼活',
    icon: '\u{2600}\u{FE0F}',
    color1: '#4ECDC4', color2: '#E0F7FA',
    gradStart: '#4ecdc4', gradEnd: '#e0f7fa',
    textColor: '#1a6b66',
  },
  evening: {
    label: '夜活',
    icon: '\u{1F319}',
    color1: '#7B68EE', color2: '#E8E0FF',
    gradStart: '#7b68ee', gradEnd: '#e8e0ff',
    textColor: '#3d3270',
  },
};

const celebMessages = {
  morning: [
    ["おはよう!\n朝から動けた自分、すごい!", "早起きは三文の徳。\nでも本当の価値は\n「今日も自分を選んだ」こと。"],
    ["朝活おつかれさま!", "まだ世界が静かなうちに\n自分の時間を作れたこと、\nそれだけで十分えらい。"],
    ["朝の自分、最高!", "眠い目をこすりながらでも\n動いた。その一歩が\n未来を変えていく。"],
  ],
  afternoon: [
    ["昼活おつかれさま!", "日中のど真ん中で\n自分の時間を確保できた。\nそれってすごいこと。"],
    ["やるじゃん!", "忙しい日中に\n自分のために時間を使えた。\nその判断力、さすが。"],
    ["昼活、完了!", "太陽の下でがんばった自分に\n拍手。午後もこの調子で\nいけるよ。"],
  ],
  evening: [
    ["夜活おつかれさま!", "1日の終わりに\nもうひと踏ん張りできた。\n今日の自分に乾杯。"],
    ["おつかれさまでした!", "夜の静かな時間を\n自分のために使えた。\n明日もきっと大丈夫。"],
    ["今日もがんばった!", "疲れた体で\nそれでも動いた自分、\n本当にえらいよ。"],
  ],
};

// --- Persistence ---
function loadStats() {
  const raw = localStorage.getItem('katsuStats');
  if (!raw) return { today: 0, total: 0, streak: 0, lastDate: null };
  return JSON.parse(raw);
}
function saveStats(s) { localStorage.setItem('katsuStats', JSON.stringify(s)); }

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function updateStatsDisplay() {
  const s = loadStats();
  const today = todayStr();
  if (s.lastDate !== today) s.today = 0;
  document.getElementById('todayCount').textContent = s.today;
  document.getElementById('totalCount').textContent = s.total;
  document.getElementById('streakCount').textContent = s.streak;
}

function recordCompletion() {
  const s = loadStats();
  const today = todayStr();
  if (s.lastDate === today) {
    s.today++;
  } else {
    const last = s.lastDate ? new Date(s.lastDate) : null;
    const now = new Date(today);
    if (last) {
      const diff = (now - last) / (1000*60*60*24);
      s.streak = diff <= 1 ? s.streak + 1 : 1;
    } else {
      s.streak = 1;
    }
    s.today = 1;
  }
  s.total++;
  s.lastDate = today;
  saveStats(s);
  updateStatsDisplay();
  return s;
}

// --- Avatar ---
document.getElementById('avatarInput').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    avatarDataUrl = ev.target.result;
    localStorage.setItem('katsuAvatar', avatarDataUrl);
    loadAvatarImg();
    showAvatar();
  };
  reader.readAsDataURL(file);
});

function showAvatar() {
  if (!avatarDataUrl) return;
  document.getElementById('avatarCircle').innerHTML =
    `<img src="${avatarDataUrl}" alt="icon">`;
}

function loadAvatarImg() {
  if (!avatarDataUrl) return;
  avatarImg = new Image();
  avatarImg.src = avatarDataUrl;
}

const savedAvatar = localStorage.getItem('katsuAvatar');
if (savedAvatar) { avatarDataUrl = savedAvatar; loadAvatarImg(); showAvatar(); }

// --- Activity selector ---
function selectActivity(btn) {
  document.querySelectorAll('.act-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedType = btn.dataset.type;
  const completeBtn = document.getElementById('completeBtn');
  completeBtn.disabled = false;
  completeBtn.style.opacity = '1';
}

// --- Complete ---
function completeActivity() {
  if (!selectedType) return;
  const stats = recordCompletion();
  playSound();
  showCelebration(stats);
}

// --- Celebration ---
function showCelebration(stats) {
  const config = activityConfig[selectedType];
  const msgs = celebMessages[selectedType];
  const pick = msgs[Math.floor(Math.random() * msgs.length)];

  const now = new Date();
  const dateStr = `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')}`;
  const timeStr = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

  lastCelebData = { config, pick, stats, dateStr, timeStr, type: selectedType };

  const celeb = document.getElementById('celebration');
  const avatarEl = document.getElementById('celebAvatar');

  if (avatarDataUrl) {
    avatarEl.innerHTML = `<img src="${avatarDataUrl}" alt="icon">`;
    avatarEl.style.display = '';
    avatarEl.style.borderColor = config.color1;
    avatarEl.style.boxShadow = `0 0 40px ${config.color1}66, 0 0 80px ${config.color1}33`;
  } else {
    avatarEl.style.display = 'none';
  }

  document.getElementById('celebTitle').textContent = pick[0];
  document.getElementById('celebTitle').style.color = config.color1;
  document.getElementById('celebActivity').textContent = `${config.icon} ${config.label} completed - ${timeStr}`;
  document.getElementById('celebActivity').style.color = config.color1;
  document.getElementById('celebMsg').textContent = pick[1];

  let streakText = `Today: ${stats.today} activities`;
  if (stats.streak > 1) streakText += ` | ${stats.streak}-day streak!`;
  document.getElementById('celebStreak').textContent = streakText;
  document.getElementById('celebStreak').style.color = config.color1;

  celeb.classList.add('show');
  launchConfetti(config.color1);
}

function closeCelebration() {
  document.getElementById('celebration').classList.remove('show');
  document.querySelectorAll('.act-btn').forEach(b => b.classList.remove('active'));
  selectedType = null;
  const completeBtn = document.getElementById('completeBtn');
  completeBtn.disabled = true;
  completeBtn.style.opacity = '0.5';
}

// --- Card rendering (shared) ---
function renderCard() {
  const { config, pick, stats, dateStr, timeStr } = lastCelebData;
  const canvas = document.getElementById('cardCanvas');
  const ctx = canvas.getContext('2d');
  const W = 1080, H = 1080;

  // Background gradient
  const grad = ctx.createLinearGradient(0, 0, W, H);
  grad.addColorStop(0, config.gradEnd);
  grad.addColorStop(1, '#ffffff');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Decorative circles
  ctx.globalAlpha = 0.08;
  ctx.fillStyle = config.color1;
  ctx.beginPath(); ctx.arc(150, 150, 200, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(930, 900, 250, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(900, 200, 120, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = 1;

  // Border frame
  ctx.strokeStyle = config.color1;
  ctx.lineWidth = 6;
  ctx.globalAlpha = 0.3;
  roundRect(ctx, 30, 30, W-60, H-60, 40);
  ctx.stroke();
  ctx.globalAlpha = 1;

  // Avatar (if exists)
  let contentStartY = 200;
  if (avatarImg && avatarImg.complete && avatarImg.naturalWidth > 0) {
    const cx = W/2, cy = 240, r = 100;
    contentStartY = 380;

    ctx.save();
    ctx.shadowColor = config.color1;
    ctx.shadowBlur = 30;
    ctx.beginPath(); ctx.arc(cx, cy, r+6, 0, Math.PI*2);
    ctx.fillStyle = config.color1;
    ctx.fill();
    ctx.restore();

    ctx.beginPath(); ctx.arc(cx, cy, r+5, 0, Math.PI*2);
    ctx.fillStyle = '#fff';
    ctx.fill();

    ctx.save();
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.clip();
    const imgSize = Math.max(avatarImg.naturalWidth, avatarImg.naturalHeight);
    const sx = (avatarImg.naturalWidth - imgSize) / 2;
    const sy = (avatarImg.naturalHeight - imgSize) / 2;
    ctx.drawImage(avatarImg, sx, sy, imgSize, imgSize, cx-r, cy-r, r*2, r*2);
    ctx.restore();
  }

  // Activity icon + label
  ctx.font = '60px "Segoe UI Emoji", "Apple Color Emoji", sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(config.icon, W/2, contentStartY + 10);

  ctx.font = 'bold 36px "Hiragino Sans", "Meiryo", sans-serif';
  ctx.fillStyle = config.color1;
  ctx.fillText(`${config.label} completed!`, W/2, contentStartY + 70);

  // Title
  ctx.font = 'bold 48px "Hiragino Sans", "Meiryo", sans-serif';
  ctx.fillStyle = config.textColor;
  const titleLines = pick[0].split('\n');
  let ty = contentStartY + 150;
  for (const line of titleLines) {
    ctx.fillText(line, W/2, ty);
    ty += 60;
  }

  // Sub message
  ctx.font = '30px "Hiragino Sans", "Meiryo", sans-serif';
  ctx.fillStyle = config.textColor + 'cc';
  const msgLines = pick[1].split('\n');
  ty += 10;
  for (const line of msgLines) {
    ctx.fillText(line, W/2, ty);
    ty += 46;
  }

  // Stats
  const statsY = H - 160;
  ctx.font = 'bold 28px "Hiragino Sans", "Meiryo", sans-serif';
  ctx.fillStyle = config.color1;
  let statsText = `${stats.streak} day streak`;
  if (stats.streak <= 1) statsText = `Total: ${stats.total} activities`;
  ctx.fillText(statsText, W/2, statsY);

  ctx.font = '26px "Hiragino Sans", "Meiryo", sans-serif';
  ctx.fillStyle = '#999';
  ctx.fillText(`${dateStr}  ${timeStr}`, W/2, statsY + 50);

  ctx.font = '20px "Hiragino Sans", "Meiryo", sans-serif';
  ctx.fillStyle = '#ccc';
  ctx.fillText('powered by katsu-celebration', W/2, H - 50);

  return canvas;
}

function getCardBlob() {
  return new Promise(resolve => {
    renderCard().toBlob(blob => resolve(blob), 'image/png');
  });
}

function getShareText() {
  const { config, dateStr } = lastCelebData;
  return `${config.icon} ${config.label}おつかれさま!\n${dateStr}`;
}

// --- Share to Threads ---
async function shareToThreads() {
  const note = document.getElementById('shareNote');
  const text = getShareText();

  // Try Web Share API with file (works on mobile)
  if (navigator.canShare) {
    try {
      const blob = await getCardBlob();
      const file = new File([blob], 'otsukare.png', { type: 'image/png' });
      if (navigator.canShare({ files: [file] })) {
        await navigator.share({
          text: text,
          files: [file],
        });
        note.textContent = '';
        return;
      }
    } catch (e) {
      if (e.name === 'AbortError') return; // user cancelled
    }
  }

  // Fallback: download image + open Threads intent
  const blob = await getCardBlob();
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.download = `${lastCelebData.dateStr.replace(/\./g,'-')}_${lastCelebData.config.label}_otsukare.png`;
  link.href = url;
  link.click();
  URL.revokeObjectURL(url);

  // Open Threads intent with text
  const threadsUrl = `https://www.threads.net/intent/post?text=${encodeURIComponent(text)}`;
  setTimeout(() => window.open(threadsUrl, '_blank'), 500);

  note.textContent = 'image saved! Threads will open - paste the image there';
}

// --- Download only ---
async function downloadCard() {
  const blob = await getCardBlob();
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.download = `${lastCelebData.dateStr.replace(/\./g,'-')}_${lastCelebData.config.label}_otsukare.png`;
  link.href = url;
  link.click();
  URL.revokeObjectURL(url);
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

// --- Confetti ---
function launchConfetti(themeColor) {
  const canvas = document.getElementById('confetti');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const colors = [themeColor,'#ffc107','#ff8fab','#a8e6cf','#fddb92','#f8b4d9','#88d8ff','#b28dff'];
  const particles = [];

  for (let i = 0; i < 120; i++) {
    particles.push({
      x: canvas.width/2 + (Math.random()-0.5)*200,
      y: canvas.height/2,
      vx: (Math.random()-0.5)*16,
      vy: -Math.random()*18 - 4,
      color: colors[Math.floor(Math.random()*colors.length)],
      size: Math.random()*8 + 4,
      rotation: Math.random()*360,
      rotSpeed: (Math.random()-0.5)*10,
      gravity: 0.3 + Math.random()*0.2,
      opacity: 1,
      shape: Math.random()>0.5 ? 'rect' : 'circle',
    });
  }

  let frame = 0;
  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let alive = false;
    for (const p of particles) {
      p.x += p.vx; p.vy += p.gravity; p.y += p.vy;
      p.rotation += p.rotSpeed; p.vx *= 0.99;
      if (frame > 60) p.opacity -= 0.015;
      if (p.opacity <= 0) continue;
      alive = true;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation * Math.PI/180);
      ctx.globalAlpha = Math.max(0, p.opacity);
      ctx.fillStyle = p.color;
      if (p.shape === 'rect') ctx.fillRect(-p.size/2, -p.size/4, p.size, p.size/2);
      else { ctx.beginPath(); ctx.arc(0,0,p.size/2,0,Math.PI*2); ctx.fill(); }
      ctx.restore();
    }
    frame++;
    if (alive && frame < 200) requestAnimationFrame(animate);
    else ctx.clearRect(0, 0, canvas.width, canvas.height);
  }
  animate();
}

// --- Sound ---
function playSound() {
  if (!soundOn) return;
  try {
    const ac = new (window.AudioContext || window.webkitAudioContext)();
    const notes = [523.25, 659.25, 783.99, 1046.5];
    notes.forEach((freq, i) => {
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.connect(gain); gain.connect(ac.destination);
      osc.frequency.value = freq; osc.type = 'sine';
      gain.gain.setValueAtTime(0, ac.currentTime + i*0.15);
      gain.gain.linearRampToValueAtTime(0.15, ac.currentTime + i*0.15 + 0.05);
      gain.gain.linearRampToValueAtTime(0, ac.currentTime + i*0.15 + 0.4);
      osc.start(ac.currentTime + i*0.15);
      osc.stop(ac.currentTime + i*0.15 + 0.5);
    });
  } catch(e) {}
}

document.getElementById('soundToggle').addEventListener('click', () => {
  soundOn = !soundOn;
  document.getElementById('soundToggle').textContent = soundOn ? '\u{1F50A}' : '\u{1F507}';
});

updateStatsDisplay();
