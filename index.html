<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ポモ活スタンプシート</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff6b35">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ポモ活">
<meta property="og:title" content="ポモ活スタンプシート">
<meta property="og:description" content="朝活・昼活・夜活の参加記録をスタンプカードで残せるWebアプリ。みんなで楽しく続けよう！">
<meta property="og:image" content="https://oyuwarilife.github.io/katsu-celebration/ogp.png">
<meta property="og:url" content="https://oyuwarilife.github.io/katsu-celebration/">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="ポモ活スタンプシート">
<meta name="twitter:description" content="朝活・昼活・夜活の参加記録をスタンプカードで残せるWebアプリ">
<meta name="twitter:image" content="https://oyuwarilife.github.io/katsu-celebration/ogp.png">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><ellipse cx='50' cy='58' rx='32' ry='30' fill='%23e53935'/><ellipse cx='50' cy='56' rx='30' ry='28' fill='%23ff1744'/><ellipse cx='50' cy='26' rx='7' ry='5' fill='%2343a047'/><ellipse cx='41' cy='24' rx='6' ry='3.5' fill='%2343a047' transform='rotate(-25,41,24)'/><ellipse cx='59' cy='24' rx='6' ry='3.5' fill='%2343a047' transform='rotate(25,59,24)'/><ellipse cx='38' cy='48' rx='5' ry='9' fill='rgba(255,255,255,0.3)' transform='rotate(-15,38,48)'/></svg>">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><ellipse cx='50' cy='58' rx='32' ry='30' fill='%23e53935'/><ellipse cx='50' cy='56' rx='30' ry='28' fill='%23ff1744'/><ellipse cx='50' cy='26' rx='7' ry='5' fill='%2343a047'/><ellipse cx='41' cy='24' rx='6' ry='3.5' fill='%2343a047' transform='rotate(-25,41,24)'/><ellipse cx='59' cy='24' rx='6' ry='3.5' fill='%2343a047' transform='rotate(25,59,24)'/><ellipse cx='38' cy='48' rx='5' ry='9' fill='rgba(255,255,255,0.3)' transform='rotate(-15,38,48)'/></svg>">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap');
  :root { --primary:#ff6b35; --primary-light:#ffe0c2; --accent:#8bc34a; --bg:#fffdf5; --text:#4a3a2e; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Zen Maru Gothic','Hiragino Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; align-items:center; justify-content:center; overflow-x:hidden; }

  .bg-shapes { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
  .bg-shapes span { position:absolute; border-radius:50%; opacity:0.07; animation:float 8s ease-in-out infinite; }
  .bg-shapes span:nth-child(1) { width:200px; height:200px; background:#ff6b35; top:10%; left:5%; }
  .bg-shapes span:nth-child(2) { width:150px; height:150px; background:#ffc107; top:60%; right:10%; animation-delay:2s; }
  .bg-shapes span:nth-child(3) { width:100px; height:100px; background:#8bc34a; bottom:15%; left:20%; animation-delay:4s; }
  @keyframes float { 0%,100%{transform:translateY(0) scale(1)} 50%{transform:translateY(-30px) scale(1.1)} }

  .container { text-align:center; padding:1.5rem 0.8rem; max-width:420px; width:100%; position:relative; z-index:1; }

  /* Avatar */
  .avatar-area { width:90px; height:90px; margin:0 auto 0.6rem; cursor:pointer; position:relative; }
  .avatar-area input { display:none; }
  .avatar-circle { width:90px; height:90px; border-radius:50%; border:3px solid transparent; background:linear-gradient(#fff,#fff) padding-box, linear-gradient(135deg,#ff6b35,#ffc107,#8bc34a) border-box; display:flex; align-items:center; justify-content:center; overflow:hidden; transition:transform 0.3s; box-shadow:0 4px 16px rgba(255,107,53,0.2); }
  .avatar-circle:hover { transform:scale(1.08); }
  .avatar-circle img { width:100%; height:100%; object-fit:cover; }
  .avatar-placeholder { display:flex; flex-direction:column; align-items:center; gap:2px; }
  .avatar-ph-icon { font-size:1.2rem; }
  .avatar-ph-text { font-size:0.5rem; color:#bbb; line-height:1.3; font-weight:700; }

  h1 { font-size:1.4rem; font-weight:900; margin-bottom:0.2rem; background:linear-gradient(135deg,#ff6b35,#ffc107,#8bc34a); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .subtitle { font-size:0.8rem; color:#bbb; margin-bottom:0.8rem; }

  /* Streak badge */
  .streak-badge { display:none; margin:0 auto 0.8rem; padding:6px 16px; border-radius:20px; font-size:0.8rem; font-weight:900; color:#fff; animation:slideUp 0.5s both; }
  .streak-badge.show { display:inline-block; }

  /* Activity buttons */
  .activity-selector { display:flex; gap:0.4rem; justify-content:center; margin-bottom:0.8rem; }
  .act-btn { border:none; background:#fff; color:var(--text); border-radius:16px; padding:8px 6px; font-size:0.9rem; cursor:pointer; transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1); display:flex; flex-direction:column; align-items:center; gap:3px; min-width:85px; box-shadow:0 3px 12px rgba(0,0,0,0.06); font-family:inherit; }
  .act-btn .act-icon { font-size:1.6rem; transition:transform 0.3s; line-height:0; display:flex; align-items:center; justify-content:center; pointer-events:none; }
  .act-btn .act-icon svg { pointer-events:none; }
  .act-btn .act-label { pointer-events:none; font-size:0.75rem; font-weight:700; }
  .act-btn:hover { transform:translateY(-3px); }
  .act-btn:hover .act-icon { transform:scale(1.15); }
  .act-btn.active-morning { background:linear-gradient(135deg,#FF9A76,#FFECD2); color:#8B4513; box-shadow:0 4px 16px rgba(255,154,118,0.4); transform:translateY(-3px) scale(1.05); }
  .act-btn.active-afternoon { background:linear-gradient(135deg,#4ECDC4,#a8e6cf); color:#1a5c56; box-shadow:0 4px 16px rgba(78,205,196,0.4); transform:translateY(-3px) scale(1.05); }
  .act-btn.active-evening { background:linear-gradient(135deg,#7B68EE,#c4b5fd); color:#fff; box-shadow:0 4px 16px rgba(123,104,238,0.4); transform:translateY(-3px) scale(1.05); }
  .act-btn.already-done { opacity:0.45; pointer-events:none; position:relative; }
  .act-btn.already-done::after { content:'済'; position:absolute; top:4px; right:6px; font-size:0.55rem; background:var(--primary); color:#fff; border-radius:50%; width:18px; height:18px; display:flex; align-items:center; justify-content:center; font-weight:900; }

  /* Date + button row */
  .action-row { display:flex; gap:0.5rem; justify-content:center; align-items:center; margin-bottom:1rem; }
  .date-input { font-family:inherit; font-size:0.85rem; font-weight:700; color:var(--text); background:#fff; border:2px solid var(--primary-light); border-radius:12px; padding:8px 10px; text-align:center; cursor:pointer; transition:all 0.3s; box-shadow:0 2px 8px rgba(0,0,0,0.04); width:155px; }
  .date-input:focus { outline:none; border-color:var(--primary); }
  .today-hint { font-size:0.65rem; color:#bbb; margin-top:-0.5rem; margin-bottom:0.6rem; }

  .btn { border:none; border-radius:50px; padding:12px 32px; font-size:1rem; cursor:pointer; transition:all 0.3s; font-weight:900; letter-spacing:0.03em; font-family:inherit; }
  .btn-primary { background:linear-gradient(135deg,#ff6b35,#ffc107,#8bc34a); background-size:200% 200%; animation:gradShift 3s ease infinite; color:#fff; box-shadow:0 4px 16px rgba(255,107,53,0.4); font-size:1rem; padding:12px 32px; }
  @keyframes gradShift { 0%,100%{background-position:0% 50%} 50%{background-position:100% 50%} }
  .btn-primary:hover:not(:disabled) { transform:translateY(-2px) scale(1.03); }
  .btn-primary:disabled { cursor:not-allowed; }
  .btn-threads { background:#000; color:#fff; box-shadow:0 3px 12px rgba(0,0,0,0.25); padding:12px 32px; }
  .btn-threads:hover { transform:translateY(-2px); }
  .btn-save { background:linear-gradient(135deg,#4ecdc4,#44b09e); color:#fff; box-shadow:0 3px 12px rgba(78,205,196,0.35); padding:12px 32px; }
  .btn-save:hover { transform:translateY(-2px); }
  .btn-back { background:none; color:#ccc; padding:8px 24px; font-size:0.8rem; text-decoration:underline; }

  /* ===== STAMP CARD ===== */
  .stamp-card { background:#fff; border-radius:20px; padding:14px; margin-top:0.8rem; box-shadow:0 4px 20px rgba(0,0,0,0.08); border:2px solid #e8e0e4; }
  .stamp-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
  .stamp-month { font-size:1rem; font-weight:900; color:var(--text); }
  .stamp-nav { display:flex; gap:0.3rem; }
  .stamp-nav button { border:none; background:var(--primary-light); color:var(--primary); border-radius:50%; width:28px; height:28px; font-size:0.9rem; cursor:pointer; font-family:inherit; font-weight:700; transition:background 0.2s; }
  .stamp-nav button:hover { background:var(--primary); color:#fff; }
  .stamp-weekdays { display:grid; grid-template-columns:repeat(7,1fr); gap:2px; margin-bottom:4px; }
  .stamp-weekdays span { font-size:0.65rem; color:#bbb; text-align:center; padding:2px 0; }
  .stamp-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:2px; }
  .stamp-day { aspect-ratio:1; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:0.7rem; color:#999; position:relative; background:#f5f0f2; border:1.5px solid #d5cdd0; transition:background 0.2s; overflow:hidden; }
  .stamp-day.has-stamp { color:#333; border-color:#ccc; }
  .stamp-day.today { outline:2.5px solid var(--primary); outline-offset:-1px; border-color:transparent; }
  .stamp-day .day-num { font-weight:800; font-size:0.7rem; line-height:1; position:relative; z-index:2; }
  .stamp-day .hanamaru { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; z-index:1; }
  .stamp-day .hanamaru.stamps-2 { gap:0; }
  .stamp-day .hanamaru.stamps-3 { flex-wrap:wrap; gap:0; align-content:center; }
  .stamp-day .hanamaru .hana-item { display:flex; line-height:0; }
  .stamp-day.empty { background:transparent; border-color:transparent; }
  .stamp-day.has-stamp { cursor:pointer; }
  .stamp-progress { margin-top:8px; text-align:center; }
  .stamp-progress-bar { height:8px; border-radius:4px; background:#eee; overflow:hidden; margin:4px 0; }
  .stamp-progress-fill { height:100%; border-radius:4px; transition:width 0.4s ease; }
  .stamp-progress-text { font-size:0.7rem; font-weight:700; color:#888; }
  .stamp-legend { display:flex; gap:0.8rem; justify-content:center; align-items:center; margin-top:6px; font-size:0.65rem; color:#aaa; }

  /* ===== CELEBRATION ===== */
  .celebration { position:fixed; inset:0; display:none; flex-direction:column; align-items:center; justify-content:center; z-index:100; padding:2rem; overflow:hidden; }
  .celebration.show { display:flex; }
  .celeb-bg { position:absolute; inset:0; animation:celebBgIn 0.6s ease-out both; }
  @keyframes celebBgIn { from{opacity:0;transform:scale(0);border-radius:50%} to{opacity:1;transform:scale(1);border-radius:0} }
  .celeb-content { position:relative; z-index:1; display:flex; flex-direction:column; align-items:center; }
  .celeb-crown { font-size:3rem; animation:crownBounce 1s ease-in-out infinite; margin-bottom:-10px; }
  @keyframes crownBounce { 0%,100%{transform:translateY(0) rotate(-5deg)} 50%{transform:translateY(-8px) rotate(5deg)} }
  .celeb-avatar { width:140px; height:140px; border-radius:50%; border:5px solid #fff; overflow:hidden; animation:avatarPop 0.6s 0.2s cubic-bezier(0.34,1.56,0.64,1) both; box-shadow:0 0 0 4px var(--accent),0 0 50px rgba(255,193,7,0.4); margin-bottom:1rem; }
  .celeb-avatar img { width:100%; height:100%; object-fit:cover; }
  @keyframes avatarPop { from{transform:scale(0) rotate(-20deg);opacity:0} to{transform:scale(1) rotate(0);opacity:1} }
  .celeb-title { font-size:2rem; font-weight:900; color:#fff; text-shadow:0 2px 16px rgba(0,0,0,0.15); margin-bottom:0.3rem; animation:slideUp 0.5s 0.4s both; }
  .celeb-activity-label { font-size:1.1rem; color:#fff; font-weight:900; margin-bottom:0.8rem; animation:slideUp 0.5s 0.5s both; text-shadow:0 2px 8px rgba(0,0,0,0.25); letter-spacing:0.05em; }
  .celeb-stamp-added { font-size:1.3rem; font-weight:900; color:#fff; animation:slideUp 0.5s 0.6s both; background:rgba(255,255,255,0.25); border-radius:20px; padding:8px 24px; margin-bottom:1.5rem; backdrop-filter:blur(4px); text-shadow:0 2px 8px rgba(0,0,0,0.2); }
  .celeb-btns { display:flex; flex-direction:column; align-items:center; gap:0.5rem; animation:slideUp 0.5s 0.8s both; }
  @keyframes slideUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }

  .stars-burst { position:absolute; top:50%; left:50%; width:0; height:0; z-index:0; }
  #confetti { position:fixed; inset:0; z-index:101; pointer-events:none; }
  #cardCanvas { display:none; }

  /* ===== MILESTONE POPUP ===== */
  .milestone-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.5); display:none; align-items:center; justify-content:center; z-index:300; padding:1.5rem; backdrop-filter:blur(4px); }
  .milestone-overlay.show { display:flex; }
  .milestone-box { background:#fff; border-radius:24px; padding:2rem 1.5rem; max-width:360px; width:100%; text-align:center; animation:milestoneIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both; box-shadow:0 20px 60px rgba(0,0,0,0.2); }
  @keyframes milestoneIn { from{transform:scale(0.5) translateY(40px);opacity:0} to{transform:scale(1) translateY(0);opacity:1} }
  .milestone-emoji { font-size:3rem; margin-bottom:0.5rem; }
  .milestone-title { font-size:1.4rem; font-weight:900; color:var(--text); margin-bottom:0.5rem; }
  .milestone-desc { font-size:0.9rem; color:#888; margin-bottom:1.2rem; line-height:1.6; }
  .milestone-btn { display:inline-block; border:none; border-radius:50px; padding:14px 36px; font-size:1rem; font-weight:900; cursor:pointer; font-family:inherit; text-decoration:none; color:#fff; background:linear-gradient(135deg,#ff6b35,#ffc107); box-shadow:0 4px 16px rgba(255,107,53,0.4); transition:transform 0.2s; }
  .milestone-btn:hover { transform:translateY(-2px) scale(1.03); }
  .milestone-close { border:none; background:none; color:#ccc; font-size:0.8rem; cursor:pointer; margin-top:0.8rem; text-decoration:underline; font-family:inherit; display:block; margin-left:auto; margin-right:auto; }

  /* ===== CUSTOM CONFIRM DIALOG ===== */
  .confirm-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.4); display:none; align-items:center; justify-content:center; z-index:400; padding:1.5rem; backdrop-filter:blur(3px); }
  .confirm-overlay.show { display:flex; }
  .confirm-box { background:#fff; border-radius:20px; padding:1.5rem; max-width:320px; width:100%; text-align:center; animation:milestoneIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both; box-shadow:0 16px 48px rgba(0,0,0,0.15); }
  .confirm-msg { font-size:0.95rem; font-weight:700; color:var(--text); margin-bottom:1rem; line-height:1.5; }
  .confirm-btns { display:flex; gap:0.6rem; justify-content:center; }
  .confirm-btns button { border:none; border-radius:50px; padding:10px 24px; font-size:0.85rem; font-weight:900; cursor:pointer; font-family:inherit; transition:transform 0.2s; }
  .confirm-yes { background:linear-gradient(135deg,#ff6b35,#ffc107); color:#fff; box-shadow:0 3px 12px rgba(255,107,53,0.3); }
  .confirm-no { background:#f0f0f0; color:#999; }
  .confirm-btns button:hover { transform:translateY(-1px); }

  /* ===== WEEKLY/MONTHLY SUMMARY ===== */
  .summary-section { margin-top:1.2rem; display:flex; gap:0.6rem; justify-content:center; flex-wrap:wrap; }
  .summary-card { background:#fff; border-radius:16px; padding:0.8rem 1.2rem; box-shadow:0 2px 8px rgba(0,0,0,0.06); border:2px solid var(--primary-light); text-align:center; min-width:140px; flex:1; max-width:200px; }
  .summary-label { font-size:0.7rem; color:#aaa; font-weight:700; margin-bottom:0.3rem; }
  .summary-value { font-size:1.6rem; font-weight:900; color:var(--primary); }
  .summary-unit { font-size:0.75rem; color:#888; font-weight:700; }

  /* ===== RANKING ===== */
  .ranking-section { margin-top:1.5rem; background:#fff; border-radius:20px; padding:1.2rem; box-shadow:0 2px 12px rgba(0,0,0,0.06); border:2px solid var(--primary-light); }
  .ranking-title { font-size:1rem; font-weight:900; color:var(--primary); text-align:center; margin-bottom:0.8rem; }
  .ranking-list { display:flex; flex-direction:column; gap:0.4rem; }
  .ranking-item { display:flex; align-items:center; gap:0.5rem; padding:0.5rem 0.8rem; border-radius:12px; background:#fafafa; }
  .ranking-item.me { background:var(--primary-light); border:2px solid var(--primary); }
  .ranking-rank { font-size:1.1rem; font-weight:900; min-width:2rem; text-align:center; }
  .ranking-name { flex:1; font-size:0.85rem; font-weight:700; color:#4a3347; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .ranking-count { font-size:1rem; font-weight:900; color:var(--primary); }
  .ranking-count small { font-size:0.7rem; font-weight:700; color:#aaa; margin-left:2px; }
  .ranking-empty, .ranking-error, .ranking-loading { text-align:center; color:#aaa; font-size:0.8rem; padding:1rem; }

  /* ===== NICKNAME DIALOG ===== */
  .nickname-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:1200; display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:opacity 0.3s; }
  .nickname-overlay.show { opacity:1; pointer-events:auto; }
  .nickname-box { background:#fff; border-radius:24px; padding:2rem 1.5rem; width:90%; max-width:320px; text-align:center; box-shadow:0 20px 60px rgba(0,0,0,0.2); }
  .nickname-msg { font-size:1.1rem; font-weight:900; color:#4a3347; margin-bottom:0.3rem; }
  .nickname-sub { font-size:0.75rem; color:#aaa; margin-bottom:1rem; }
  .nickname-box input { width:80%; border:2px solid #eee; border-radius:12px; padding:10px 14px; font-size:1rem; font-family:inherit; text-align:center; outline:none; transition:border 0.2s; }
  .nickname-box input:focus { border-color:var(--primary); }
  .nickname-box button { display:block; width:80%; margin:0.6rem auto 0; border:none; border-radius:50px; padding:10px; font-size:0.9rem; font-weight:900; cursor:pointer; font-family:inherit; }
  #nicknameOk { background:linear-gradient(135deg,#ff6b35,#ffc107); color:#fff; box-shadow:0 3px 12px rgba(255,107,53,0.3); }
  .nickname-skip { background:none; color:#aaa; font-size:0.8rem !important; }

  /* Small screen adjustments */
  @media (max-width: 380px) {
    .container { padding:1rem 0.5rem; }
    .act-btn { min-width:75px; padding:8px 4px; }
    .act-btn .act-icon svg { width:40px; height:40px; }
    .stamp-grid { gap:1px; }
    .stamp-day { border-radius:6px; }
    .stamp-day .day-num { font-size:0.6rem; }
    h1 { font-size:1.2rem; }
    .btn-primary { font-size:0.9rem; padding:10px 24px; }
    .date-input { width:140px; font-size:0.8rem; padding:8px; }
  }
</style>
</head>
<body>
<div class="bg-shapes"><span></span><span></span><span></span></div>
<div class="container">
  <div class="avatar-area" onclick="document.getElementById('avatarInput').click()">
    <div class="avatar-circle" id="avatarCircle">
      <div class="avatar-placeholder"><span class="avatar-ph-icon">&#x1f4f7;</span><span class="avatar-ph-text">アイコン画像を<br>アップロード</span></div>
    </div>
    <input type="file" id="avatarInput" accept="image/*">
  </div>

  <h1>ポモ活スタンプシート</h1>

  <div class="streak-badge" id="streakBadge"></div>

  <div class="activity-selector" id="activitySelector">
    <button class="act-btn" data-type="morning" onclick="selectActivity(this)">
      <span class="act-icon" id="iconMorning"></span>
      <span class="act-label">朝活</span>
    </button>
    <button class="act-btn" data-type="afternoon" onclick="selectActivity(this)">
      <span class="act-icon" id="iconAfternoon"></span>
      <span class="act-label">昼活</span>
    </button>
    <button class="act-btn" data-type="evening" onclick="selectActivity(this)">
      <span class="act-icon" id="iconEvening"></span>
      <span class="act-label">夜活</span>
    </button>
  </div>

  <div class="action-row">
    <input type="date" id="dateInput" class="date-input">
    <button class="btn btn-primary" id="completeBtn" onclick="completeActivity()" disabled style="opacity:0.4">参加した！</button>
  </div>
  <p class="today-hint" id="todayHint"></p>

  <!-- Stamp Card -->
  <div class="stamp-card">
    <div class="stamp-header">
      <div class="stamp-nav"><button onclick="changeMonth(-1)">&lt;</button></div>
      <div class="stamp-month" id="stampMonth"></div>

// --- Tomato stamp ---
function hanamaruSVG(color, size = 32) {
  return `<svg width="${size}" height="${size}" viewBox="0 0 100 100">
    <ellipse cx="50" cy="58" rx="32" ry="30" fill="#e53935"/>
    <ellipse cx="50" cy="56" rx="30" ry="28" fill="#ff1744"/>
    <path d="M38 30 Q42 16 50 20 Q58 16 62 30" stroke="#2e7d32" stroke-width="3" fill="none" stroke-linecap="round"/>
    <ellipse cx="50" cy="26" rx="7" ry="5" fill="#43a047"/>
    <ellipse cx="41" cy="24" rx="6" ry="3.5" fill="#43a047" transform="rotate(-25,41,24)"/>
    <ellipse cx="59" cy="24" rx="6" ry="3.5" fill="#43a047" transform="rotate(25,59,24)"/>
    <ellipse cx="38" cy="48" rx="5" ry="9" fill="rgba(255,255,255,0.3)" transform="rotate(-15,38,48)"/>
  </svg>`;
}

function drawHanamaru(ctx, cx, cy, r, color) {
  ctx.save();
  // Tomato body (shadow)
  ctx.fillStyle = '#e53935';
  ctx.globalAlpha = 1;
  ctx.beginPath();
  ctx.ellipse(cx, cy + r * 0.15, r * 0.95, r * 0.9, 0, 0, Math.PI * 2);
  ctx.fill();
  // Tomato body (main)
  ctx.fillStyle = '#ff1744';
  ctx.beginPath();
  ctx.ellipse(cx, cy + r * 0.08, r * 0.9, r * 0.85, 0, 0, Math.PI * 2);
  ctx.fill();
  // Highlight
  ctx.globalAlpha = 0.3;
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.ellipse(cx - r * 0.25, cy - r * 0.15, r * 0.18, r * 0.3, -0.3, 0, Math.PI * 2);
  ctx.fill();
  // Leaves
  ctx.globalAlpha = 1;
  ctx.fillStyle = '#43a047';
  ctx.beginPath();
  ctx.ellipse(cx, cy - r * 0.6, r * 0.22, r * 0.15, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(cx - r * 0.22, cy - r * 0.65, r * 0.18, r * 0.1, -0.4, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(cx + r * 0.22, cy - r * 0.65, r * 0.18, r * 0.1, 0.4, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

// --- Stamp data ---
function loadStamps() {
  const raw = localStorage.getItem('katsuStamps');
  return raw ? JSON.parse(raw) : {};
}
function saveStamps(s) { localStorage.setItem('katsuStamps', JSON.stringify(s)); }

function addStamp(dateStr, type) {
  const stamps = loadStamps();
  const [y, m, d] = dateStr.split('-');
  const key = `${y}-${m}`;
  if (!stamps[key]) stamps[key] = {};
  if (!stamps[key][d]) stamps[key][d] = [];
  if (!stamps[key][d].includes(type)) stamps[key][d].push(type);
  saveStamps(stamps);
}

function isAlreadyStamped(dateStr, type) {
  const stamps = loadStamps();
  const [y, m, d] = dateStr.split('-');
  const key = `${y}-${m}`;
  return stamps[key]?.[d]?.includes(type) || false;
}

// --- Custom confirm dialog ---
function showConfirm(msg) {
  return new Promise((resolve) => {
    document.getElementById('confirmMsg').textContent = msg;
    document.getElementById('confirmOverlay').classList.add('show');
    const yes = document.getElementById('confirmYes');
    const no = document.getElementById('confirmNo');
    function cleanup() {
      document.getElementById('confirmOverlay').classList.remove('show');
      yes.removeEventListener('click', onYes);
      no.removeEventListener('click', onNo);
    }
    function onYes() { cleanup(); resolve(true); }
    function onNo() { cleanup(); resolve(false); }
    yes.addEventListener('click', onYes);
    no.addEventListener('click', onNo);
  });
}

async function removeStamp(year, month, day) {
  const stamps = loadStamps();
  const key = `${year}-${String(month).padStart(2,'0')}`;
  const dayKey = String(day).padStart(2,'0');
  if (!stamps[key] || !stamps[key][dayKey] || stamps[key][dayKey].length === 0) return;
  const labels = stamps[key][dayKey].map(t => CFG[t]?.label || t).join('・');
  const ok = await showConfirm(`${month}/${day} の記録（${labels}）を取り消しますか？`);
  if (!ok) return;
  delete stamps[key][dayKey];
  saveStamps(stamps);
  renderStampCard();
  updateAlreadyDone();
  updateStreak();
  updateSummary();
  scheduleSendStamps();
}

function getMonthStamps(year, month) {
  const stamps = loadStamps();
  const key = `${year}-${String(month).padStart(2,'0')}`;
  return stamps[key] || {};
}

function countTotalStamps() {
  const stamps = loadStamps();
  let total = 0;
  for (const month of Object.values(stamps)) {
    for (const day of Object.values(month)) total += day.length;
  }
  return total;
}

// --- Streak calculation ---
function calcStreak() {
  const stamps = loadStamps();
  const allDates = [];
  for (const [monthKey, days] of Object.entries(stamps)) {
    for (const [dayKey, types] of Object.entries(days)) {
      if (types.length > 0) allDates.push(`${monthKey}-${dayKey}`);
    }
  }
  if (allDates.length === 0) return 0;
  allDates.sort().reverse();
  const today = new Date();
  today.setHours(0,0,0,0);
  let streak = 0;
  let checkDate = new Date(today);
  // Check if today or yesterday has a stamp to start
  const todayStr = `${checkDate.getFullYear()}-${String(checkDate.getMonth()+1).padStart(2,'0')}-${String(checkDate.getDate()).padStart(2,'0')}`;
  if (!allDates.includes(todayStr)) {
    checkDate.setDate(checkDate.getDate() - 1);
    const yStr = `${checkDate.getFullYear()}-${String(checkDate.getMonth()+1).padStart(2,'0')}-${String(checkDate.getDate()).padStart(2,'0')}`;
    if (!allDates.includes(yStr)) return 0;
  }
  while (true) {
    const ds = `${checkDate.getFullYear()}-${String(checkDate.getMonth()+1).padStart(2,'0')}-${String(checkDate.getDate()).padStart(2,'0')}`;
    if (allDates.includes(ds)) {
      streak++;
      checkDate.setDate(checkDate.getDate() - 1);
    } else {
      break;
    }
  }
  return streak;
}

function updateStreak() {
  const streak = calcStreak();
  const badge = document.getElementById('streakBadge');
  if (streak >= 2) {
    badge.textContent = `\u{1F525} ${streak}日連続参加中！`;
    badge.style.background = streak >= 7 ? 'linear-gradient(135deg,#ff6b35,#ffc107)' : 'linear-gradient(135deg,#ffa726,#ffcc80)';
    badge.classList.add('show');
  } else {
    badge.classList.remove('show');
  }
}

// --- Update already-done state on activity buttons ---
function updateAlreadyDone() {
  const dateVal = document.getElementById('dateInput').value;
  document.querySelectorAll('.act-btn').forEach(btn => {
    const type = btn.dataset.type;
    if (isAlreadyStamped(dateVal, type)) {
      btn.classList.add('already-done');
    } else {
      btn.classList.remove('already-done');
    }
  });
}

// --- Stamp card rendering ---
function renderStampCard() {
  const grid = document.getElementById('stampGrid');
  const monthLabel = document.getElementById('stampMonth');
  const card = document.querySelector('.stamp-card');
  const year = viewYear, month = viewMonth;
  const stamps = getMonthStamps(year, month);
  const season = SEASON[month];
  const today = new Date();
  const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

  monthLabel.textContent = `${season.emoji} ${year}年${month}月 ${season.emoji}`;
  card.style.background = season.bg;
  card.style.borderTop = `3px solid ${season.color}`;

  document.documentElement.style.setProperty('--stamp-color', season.color);
  document.documentElement.style.setProperty('--stamp-bg', season.bg);

  const firstDay = new Date(year, month - 1, 1).getDay();
  const daysInMonth = new Date(year, month, 0).getDate();

  let html = '';
  for (let i = 0; i < firstDay; i++) html += '<div class="stamp-day empty"></div>';

  for (let d = 1; d <= daysInMonth; d++) {
    const dayKey = String(d).padStart(2, '0');
    const dayStamps = stamps[dayKey] || [];
    const dateCheck = `${year}-${String(month).padStart(2,'0')}-${dayKey}`;
    const isToday = dateCheck === todayStr;
    const hasStamp = dayStamps.length > 0;

    const stampStyle = hasStamp ? `background:${season.color}08;` : '';
    const todayStyle = isToday ? `outline-color:${season.color};` : '';
    const n = dayStamps.length;
    const sz = n >= 3 ? 20 : n === 2 ? 24 : 34;
    const layoutClass = n >= 3 ? 'stamps-3' : n === 2 ? 'stamps-2' : 'stamps-1';

    let stampHtml = '';
    if (hasStamp) {
      for (let si = 0; si < n; si++) {
        const rot = ((d * 7 + si * 13 + month * 3) % 25 - 12);
        stampHtml += `<span class="hana-item" style="transform:rotate(${rot}deg)">${hanamaruSVG(season.color, sz)}</span>`;
      }
    }

    html += `<div class="stamp-day${hasStamp ? ' has-stamp' : ''}${isToday ? ' today' : ''}" style="${stampStyle}${todayStyle}"${hasStamp ? ` onclick="removeStamp(${year},${month},${d})"` : ''}>
      <span class="day-num">${d}</span>
      ${hasStamp ? `<span class="hanamaru ${layoutClass}">${stampHtml}</span>` : ''}
    </div>`;
  }
  grid.innerHTML = html;

  const stampedDays = Object.keys(stamps).filter(k => stamps[k].length > 0).length;
  const pct = Math.round((stampedDays / daysInMonth) * 100);
  document.getElementById('stampProgress').innerHTML = `
    <div class="stamp-progress-bar"><div class="stamp-progress-fill" style="width:${pct}%;background:${season.color}"></div></div>
    <span class="stamp-progress-text">${stampedDays} / ${daysInMonth}日 参加（${pct}%）</span>`;

  document.getElementById('stampLegend').innerHTML = `<span>${hanamaruSVG(season.color, 18)} = 参加した日　｜　タップで取り消し</span>`;
}

function changeMonth(delta) {
  viewMonth += delta;
  if (viewMonth > 12) { viewMonth = 1; viewYear++; }
  if (viewMonth < 1) { viewMonth = 12; viewYear--; }
  renderStampCard();
}

  const file = e.target.files[0];
  if (!file) return;

  };

});

function loadAvatarImg() { if (!avatarDataUrl) return; avatarImg = new Image(); avatarImg.src = avatarDataUrl; }

if (savedAvatar) { avatarDataUrl = savedAvatar; loadAvatarImg(); showAvatar(); }

// --- Activity selector ---
function selectActivity(btn) {
  if (btn.classList.contains('already-done')) return;
  document.querySelectorAll('.act-btn').forEach(b => b.classList.remove('active-morning','active-afternoon','active-evening'));
  selectedType = btn.dataset.type;
  btn.classList.add('active-' + selectedType);
  document.getElementById('completeBtn').disabled = false;
  document.getElementById('completeBtn').style.opacity = '1';
}

// --- Complete ---
function completeActivity() {
  if (!selectedType) return;
  const dateVal = document.getElementById('dateInput').value;
  if (isAlreadyStamped(dateVal, selectedType)) return;
  addStamp(dateVal, selectedType);
  renderStampCard();
  updateAlreadyDone();
  updateStreak();
  updateSummary();
  scheduleSendStamps();
  showCelebration(dateVal);
}

// --- Celebration ---
function showCelebration(dateVal) {
  const config = CFG[selectedType];
  const dateStr = dateVal.replace(/-/g, '.');
  const now = new Date();
  const timeStr = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  const total = countTotalStamps();

  lastCelebData = { config, dateStr, timeStr, type: selectedType, total, dateVal };

  document.getElementById('celebBg').style.background = config.grad;
  document.getElementById('celebCrown').textContent = config.crown;

  const avatarEl = document.getElementById('celebAvatar');
  if (avatarDataUrl) { avatarEl.innerHTML = `<img src="${avatarDataUrl}" alt="icon">`; avatarEl.style.display = ''; }
  else { avatarEl.style.display = 'none'; }

  document.getElementById('celebTitle').textContent = `${config.label}に参加しました!`;
  document.getElementById('celebActivity').textContent = `${dateStr} ${timeStr}`;
  document.getElementById('celebStamp').textContent = `\u{1F3C5} スタンプ ${total}個目!`;

  const burst = document.getElementById('starsBurst');
  burst.innerHTML = '';
  const stars = ['\u{2B50}','\u{2728}','\u{1F31F}','\u{1F3C5}','\u{1F389}','\u{1FA77}'];
  for (let i = 0; i < 12; i++) {
    const s = document.createElement('span');
    s.textContent = stars[i % stars.length];
    s.style.position = 'absolute'; s.style.fontSize = '1.5rem';
    const angle = (i / 12) * Math.PI * 2;
    const dist = 120 + Math.random() * 80;
    s.animate([
      { transform:'translate(0,0) scale(0) rotate(0deg)', opacity:1 },
      { transform:`translate(${Math.cos(angle)*dist}px,${Math.sin(angle)*dist}px) scale(1.5) rotate(${360+Math.random()*180}deg)`, opacity:0 },
    ], { duration:1200, delay:i*80, easing:'ease-out', fill:'both' });
    burst.appendChild(s);
  }

  document.getElementById('celebration').classList.add('show');
  launchConfetti(config.color1);
}

// --- Milestone popup ---
function checkMilestone() {
  const total = countTotalStamps();
  const shown = JSON.parse(localStorage.getItem('katsuMilestonesShown') || '[]');

  if (milestone >= 10 && !shown.includes(milestone)) {

// --- Card image: stamp card style ---
function renderCard() {
  const { config, dateStr, timeStr, total, dateVal } = lastCelebData;
  const canvas = document.getElementById('cardCanvas');
  const ctx = canvas.getContext('2d');
  const W = 1080, H = 1350;
  const cx = W / 2;

  const [yr, mo] = dateVal.split('-');
  const year = parseInt(yr), month = parseInt(mo);
  const stamps = getMonthStamps(year, month);

  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, W, H);

  const season = SEASON[month];

  const topGrad = ctx.createLinearGradient(0, 0, W, 0);
  topGrad.addColorStop(0, season.color);
  topGrad.addColorStop(1, config.color1);
  ctx.fillStyle = topGrad;
  roundRect(ctx, 0, 0, W, 200, 0);
  ctx.fill();

  if (avatarImg && avatarImg.complete && avatarImg.naturalWidth > 0) {
    const ar = 50;
    ctx.beginPath(); ctx.arc(80, 100, ar + 3, 0, Math.PI * 2);
    ctx.fillStyle = '#fff';
    ctx.fill();
    ctx.save();
    ctx.beginPath(); ctx.arc(80, 100, ar, 0, Math.PI * 2); ctx.clip();
    const imgSize = Math.max(avatarImg.naturalWidth, avatarImg.naturalHeight);
    ctx.drawImage(avatarImg, (avatarImg.naturalWidth-imgSize)/2, (avatarImg.naturalHeight-imgSize)/2, imgSize, imgSize, 80-ar, 100-ar, ar*2, ar*2);
    ctx.restore();
  }

  ctx.textAlign = 'center';
  ctx.font = '900 48px "Zen Maru Gothic","Hiragino Sans","Meiryo",sans-serif';
  ctx.fillStyle = '#fff';
  ctx.fillText(`${config.label}に参加しました!`, cx + 20, 90);

  ctx.font = 'bold 30px "Zen Maru Gothic","Hiragino Sans","Meiryo",sans-serif';
  ctx.fillStyle = '#fff';
  ctx.shadowColor = 'rgba(0,0,0,0.3)';
  ctx.shadowBlur = 6;
  ctx.fillText(`${dateStr}  ${timeStr}`, cx + 20, 145);
  ctx.shadowBlur = 0;

  ctx.font = '40px "Segoe UI Emoji","Apple Color Emoji",sans-serif';
  ctx.fillText('\u{1F3C5}', cx, 260);
  ctx.font = '900 34px "Zen Maru Gothic","Hiragino Sans","Meiryo",sans-serif';
  ctx.fillStyle = '#2d2d2d';
  ctx.fillText(`${total}個目のスタンプ!`, cx, 310);

  const gridTop = 360;
  const cellSize = 120;
  const gap = 8;
  const gridW = 7 * cellSize + 6 * gap;
  const gridLeft = (W - gridW) / 2;

  ctx.font = '36px "Segoe UI Emoji","Apple Color Emoji",sans-serif';
  ctx.fillText(season.emoji, cx - 160, gridTop - 5);
  ctx.fillText(season.emoji, cx + 160, gridTop - 5);
  ctx.font = 'bold 32px "Zen Maru Gothic","Hiragino Sans","Meiryo",sans-serif';
  ctx.fillStyle = season.color;
  ctx.fillText(`${year}年${month}月`, cx, gridTop - 10);

  const weekdays = ['\u65E5','\u6708','\u706B','\u6C34','\u6728','\u91D1','\u571F'];
  ctx.font = 'bold 20px "Zen Maru Gothic","Hiragino Sans","Meiryo",sans-serif';
  ctx.fillStyle = '#aaa';
  for (let i = 0; i < 7; i++) {
    ctx.fillText(weekdays[i], gridLeft + i * (cellSize + gap) + cellSize / 2, gridTop + 25);
  }

  const firstDay = new Date(year, month - 1, 1).getDay();
  const daysInMonth = new Date(year, month, 0).getDate();
  const rowTop = gridTop + 45;

  for (let d = 1; d <= daysInMonth; d++) {
    const idx = firstDay + d - 1;
    const col = idx % 7;
    const row = Math.floor(idx / 7);
    const x = gridLeft + col * (cellSize + gap);
    const y = rowTop + row * (cellSize + gap);
    const dayKey = String(d).padStart(2, '0');
    const dayStamps = stamps[dayKey] || [];

    if (dayStamps.length > 0) {
      ctx.fillStyle = season.color + '15';
    } else {
      ctx.fillStyle = '#f8f8f8';
    }
    roundRect(ctx, x, y, cellSize, cellSize, 12);
    ctx.fill();

    ctx.strokeStyle = dayStamps.length > 0 ? '#ccc' : '#e0e0e0';
    ctx.lineWidth = 1.5;
    roundRect(ctx, x, y, cellSize, cellSize, 12);
    ctx.stroke();

    if (dateVal === `${year}-${String(month).padStart(2,'0')}-${dayKey}`) {
      ctx.strokeStyle = season.color;
      ctx.lineWidth = 3;
      roundRect(ctx, x, y, cellSize, cellSize, 12);
      ctx.stroke();
    }

    ctx.font = 'bold 24px "Zen Maru Gothic","Hiragino Sans","Meiryo",sans-serif';
    ctx.fillStyle = dayStamps.length > 0 ? '#222' : '#bbb';
    ctx.fillText(String(d), x + cellSize / 2, y + 35);

    const n = dayStamps.length;
    if (n > 0) {
      const cx0 = x + cellSize / 2, cy0 = y + cellSize / 2 + 4;
      const positions = n === 1
        ? [[0, 0, cellSize * 0.35]]
        : n === 2
        ? [[-cellSize * 0.2, 0, cellSize * 0.24], [cellSize * 0.2, 0, cellSize * 0.24]]
        : [[-cellSize * 0.2, -cellSize * 0.12, cellSize * 0.2], [cellSize * 0.2, -cellSize * 0.12, cellSize * 0.2], [0, cellSize * 0.18, cellSize * 0.2]];
      positions.forEach(([dx, dy, r], si) => {
        ctx.save();
        const rot = ((d * 7 + si * 13 + month * 3) % 25 - 12) * Math.PI / 180;
        ctx.translate(cx0 + dx, cy0 + dy);
        ctx.rotate(rot);
        drawHanamaru(ctx, 0, 0, r, season.color);
        ctx.restore();
      });
    }
  }

  const stampedDays = Object.keys(stamps).filter(k => stamps[k].length > 0).length;
  const totalPaws = Object.values(stamps).reduce((sum, d) => sum + d.length, 0);
  const pct = Math.round((stampedDays / daysInMonth) * 100);

  const statY = H - 130;
  ctx.font = '900 32px "Zen Maru Gothic","Hiragino Sans","Meiryo",sans-serif';
  ctx.fillStyle = season.color;
  ctx.fillText(`${stampedDays}/${daysInMonth}日 参加（${pct}%）`, cx, statY);
  ctx.font = 'bold 26px "Zen Maru Gothic","Hiragino Sans","Meiryo",sans-serif';
  ctx.fillStyle = '#666';
  ctx.fillText(`今月のトマト: ${totalPaws}個`, cx, statY + 40);

  const footY = H - 40;
  ctx.strokeStyle = '#eee'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(cx - 200, footY - 25); ctx.lineTo(cx + 200, footY - 25); ctx.stroke();
  ctx.font = '20px "Zen Maru Gothic","Hiragino Sans","Meiryo",sans-serif';
  ctx.fillStyle = '#ccc';
  ctx.fillText('katsu-celebration', cx, footY);

  return canvas;
}

async function downloadCard() {
  const canvas = renderCard();
  const blob = await new Promise(r => canvas.toBlob(r, 'image/png'));
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.download = `${lastCelebData.dateStr.replace(/\./g,'-')}_${lastCelebData.config.label}_stamp.png`;
  link.href = url;
  link.click();
  URL.revokeObjectURL(url);
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath(); ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h); ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r); ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
}

// --- Confetti ---
function launchConfetti(themeColor) {
  const canvas = document.getElementById('confetti');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  const colors = [themeColor,'#ffc107','#ff6b35','#8bc34a','#fddb92','#ffa726','#88d8ff','#cddc39'];
  const particles = [];
  for (let i = 0; i < 150; i++) {
    particles.push({ x:canvas.width/2+(Math.random()-0.5)*300, y:canvas.height*0.5+(Math.random()-0.5)*100,
      vx:(Math.random()-0.5)*18, vy:-Math.random()*20-5, color:colors[Math.floor(Math.random()*colors.length)],
      size:Math.random()*9+4, rotation:Math.random()*360, rotSpeed:(Math.random()-0.5)*12,
      gravity:0.25+Math.random()*0.2, opacity:1, shape:['rect','circle'][Math.floor(Math.random()*2)] });
  }
  let frame = 0;
  function animate() {
    ctx.clearRect(0,0,canvas.width,canvas.height); let alive = false;
    for (const p of particles) {
      p.x+=p.vx; p.vy+=p.gravity; p.y+=p.vy; p.rotation+=p.rotSpeed; p.vx*=0.99;
      if (frame>70) p.opacity-=0.013; if (p.opacity<=0) continue; alive=true;
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rotation*Math.PI/180);
      ctx.globalAlpha=Math.max(0,p.opacity); ctx.fillStyle=p.color;
      if (p.shape==='rect') ctx.fillRect(-p.size/2,-p.size/4,p.size,p.size/2);
      else { ctx.beginPath(); ctx.arc(0,0,p.size/2,0,Math.PI*2); ctx.fill(); }
      ctx.restore();
    }
    frame++; if (alive&&frame<220) requestAnimationFrame(animate);
    else ctx.clearRect(0,0,canvas.width,canvas.height);
  }
  animate();
}

// --- Weekly/Monthly Summary ---
function updateSummary() {
  const stamps = loadStamps();
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());

  // This week (Monday start)
  const dayOfWeek = today.getDay();
  const mondayOffset = dayOfWeek === 0 ? 6 : dayOfWeek - 1;
  const monday = new Date(today);
  monday.setDate(today.getDate() - mondayOffset);
  let weekCount = 0;
  for (let d = new Date(monday); d <= today; d.setDate(d.getDate() + 1)) {
    const mk = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    const dk = String(d.getDate()).padStart(2,'0');
    if (stamps[mk]?.[dk]) weekCount += stamps[mk][dk].length;
  }

  // This month
  const monthKey = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  let monthCount = 0;
  let monthDays = 0;
  const monthData = stamps[monthKey] || {};
  Object.values(monthData).forEach(dayTypes => {
    if (dayTypes.length > 0) { monthCount += dayTypes.length; monthDays++; }
  });

  document.getElementById('summarySection').innerHTML = `
    <div class="summary-card">
      <div class="summary-label">今週の参加</div>
      <div class="summary-value">${weekCount}<span class="summary-unit">回</span></div>
    </div>
    <div class="summary-card">
      <div class="summary-label">今月の参加</div>
      <div class="summary-value">${monthCount}<span class="summary-unit">回</span></div>
    </div>
    <div class="summary-card">
      <div class="summary-label">今月の参加日数</div>
      <div class="summary-value">${monthDays}<span class="summary-unit">日</span></div>
    </div>
  `;
}

// --- Ranking ---
const API_URL = 'https://script.google.com/macros/s/AKfycbwgdD3uXoLi3t5uX7E89t6XIZ63mSJmVVqy14QnDfGRUL8BkmCj_ix7tGyXmrQpXFZmXg/exec';
let katsuNickname = localStorage.getItem('katsuNickname') || '';
let katsuUniqueId = localStorage.getItem('katsuUniqueId') || '';
let rankingSendTimer = null;

if (!katsuUniqueId) {
  katsuUniqueId = crypto.randomUUID ? crypto.randomUUID() :
    'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
      var r = Math.random() * 16 | 0;
      return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
    });
  localStorage.setItem('katsuUniqueId', katsuUniqueId);
}

function scheduleSendStamps() {
  if (!katsuNickname || API_URL.indexOf('PASTE_YOUR') === 0) return;
  clearTimeout(rankingSendTimer);
  rankingSendTimer = setTimeout(sendStampsToAPI, 3000);
}

async function sendStampsToAPI() {
  if (!katsuNickname) return;
  try {
    await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ nickname: katsuNickname, stampCount: countTotalStamps(), uniqueId: katsuUniqueId }),
    });
  } catch (e) { console.warn('Ranking sync failed:', e); }
}

async function loadRanking() {
  if (API_URL.indexOf('PASTE_YOUR') === 0) {
    document.getElementById('rankingSection').style.display = 'none';
    return;
  }
  var list = document.getElementById('rankingList');
  try {
    var res = await fetch(API_URL);
    var data = await res.json();
    if (!data.ranking || data.ranking.length === 0) {
      list.innerHTML = '<div class="ranking-empty">まだデータがありません</div>';
      return;
    }
    list.innerHTML = data.ranking.map(function(r, i) {
      var medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : (i + 1);
      var isMe = katsuNickname && r.nickname === katsuNickname;
      var name = document.createElement('span');
      name.textContent = r.nickname;
      var escaped = name.textContent.replace(/&/g,'&amp;').replace(/</g,'&lt;');
      return '<div class="ranking-item' + (isMe ? ' me' : '') + '">' +
        '<span class="ranking-rank">' + medal + '</span>' +
        '<span class="ranking-name">' + escaped + '</span>' +
        '<span class="ranking-count">' + r.stampCount + '<small>個</small></span></div>';
    }).join('');
  } catch (e) {
    list.innerHTML = '<div class="ranking-error">ランキングを読み込めませんでした</div>';
  }
}

function showNicknameDialog() {
  document.getElementById('nicknameOverlay').classList.add('show');
  var input = document.getElementById('nicknameInput');
  input.value = katsuNickname;
  setTimeout(function() { input.focus(); }, 300);

  function cleanup() {
    document.getElementById('nicknameOk').removeEventListener('click', onOk);
    document.getElementById('nicknameSkip').removeEventListener('click', onSkip);
    input.removeEventListener('keydown', onKey);
    document.getElementById('nicknameOverlay').classList.remove('show');
  }
  function onOk() {
    var v = input.value.trim();
    if (!v) return;
    katsuNickname = v;
    localStorage.setItem('katsuNickname', v);
    cleanup();
    sendStampsToAPI().then(loadRanking);
  }
  function onSkip() { cleanup(); }
  function onKey(e) { if (e.key === 'Enter') onOk(); }

  document.getElementById('nicknameOk').addEventListener('click', onOk);
  document.getElementById('nicknameSkip').addEventListener('click', onSkip);
  input.addEventListener('keydown', onKey);
}
