<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>おつかれさま!</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap');
  :root { --primary:#ff6b9d; --primary-light:#ffd4e5; --accent:#ffc107; --bg:#fff8fa; --text:#4a3347; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Zen Maru Gothic','Hiragino Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; align-items:center; justify-content:center; overflow-x:hidden; }

  .bg-shapes { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
  .bg-shapes span { position:absolute; border-radius:50%; opacity:0.07; animation:float 8s ease-in-out infinite; }
  .bg-shapes span:nth-child(1) { width:200px; height:200px; background:#ff6b9d; top:10%; left:5%; }
  .bg-shapes span:nth-child(2) { width:150px; height:150px; background:#ffc107; top:60%; right:10%; animation-delay:2s; }
  .bg-shapes span:nth-child(3) { width:100px; height:100px; background:#7b68ee; bottom:15%; left:20%; animation-delay:4s; }
  @keyframes float { 0%,100%{transform:translateY(0) scale(1)} 50%{transform:translateY(-30px) scale(1.1)} }

  .container { text-align:center; padding:1.5rem 1rem; max-width:420px; width:100%; position:relative; z-index:1; }

  /* Avatar */
  .avatar-area { width:100px; height:100px; margin:0 auto 0.8rem; cursor:pointer; position:relative; }
  .avatar-area input { display:none; }
  .avatar-circle { width:100px; height:100px; border-radius:50%; border:3px solid transparent; background:linear-gradient(#fff,#fff) padding-box, linear-gradient(135deg,#ff6b9d,#ffc107,#7b68ee) border-box; display:flex; align-items:center; justify-content:center; overflow:hidden; transition:transform 0.3s; box-shadow:0 4px 16px rgba(255,107,157,0.2); }
  .avatar-circle:hover { transform:scale(1.08); }
  .avatar-circle img { width:100%; height:100%; object-fit:cover; }
  .avatar-placeholder { font-size:0.7rem; color:var(--primary); line-height:1.3; }

  h1 { font-size:1.5rem; font-weight:900; margin-bottom:0.2rem; background:linear-gradient(135deg,#ff6b9d,#ff8fab,#ffc107); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .subtitle { font-size:0.8rem; color:#bbb; margin-bottom:1rem; }

  /* Activity buttons */
  .activity-selector { display:flex; gap:0.5rem; justify-content:center; margin-bottom:1rem; }
  .act-btn { border:none; background:#fff; color:var(--text); border-radius:16px; padding:10px 8px; font-size:0.9rem; cursor:pointer; transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1); display:flex; flex-direction:column; align-items:center; gap:3px; min-width:90px; box-shadow:0 3px 12px rgba(0,0,0,0.06); font-family:inherit; }
  .act-btn .act-icon { font-size:1.6rem; transition:transform 0.3s; line-height:0; display:flex; align-items:center; justify-content:center; }
  .act-btn .act-label { font-size:0.8rem; font-weight:700; }
  .act-btn:hover { transform:translateY(-3px); }
  .act-btn:hover .act-icon { transform:scale(1.15); }
  .act-btn.active-morning { background:linear-gradient(135deg,#FF9A76,#FFECD2); color:#8B4513; box-shadow:0 4px 16px rgba(255,154,118,0.4); transform:translateY(-3px) scale(1.05); }
  .act-btn.active-afternoon { background:linear-gradient(135deg,#4ECDC4,#a8e6cf); color:#1a5c56; box-shadow:0 4px 16px rgba(78,205,196,0.4); transform:translateY(-3px) scale(1.05); }
  .act-btn.active-evening { background:linear-gradient(135deg,#7B68EE,#c4b5fd); color:#fff; box-shadow:0 4px 16px rgba(123,104,238,0.4); transform:translateY(-3px) scale(1.05); }

  /* Date + button row */
  .action-row { display:flex; gap:0.6rem; justify-content:center; align-items:center; margin-bottom:1.2rem; }
  .date-input { font-family:inherit; font-size:0.9rem; font-weight:700; color:var(--text); background:#fff; border:2px solid var(--primary-light); border-radius:12px; padding:10px 14px; text-align:center; cursor:pointer; transition:all 0.3s; box-shadow:0 2px 8px rgba(0,0,0,0.04); width:170px; }
  .date-input:focus { outline:none; border-color:var(--primary); }

  .btn { border:none; border-radius:50px; padding:12px 32px; font-size:1rem; cursor:pointer; transition:all 0.3s; font-weight:900; letter-spacing:0.03em; font-family:inherit; }
  .btn-primary { background:linear-gradient(135deg,#ff6b9d,#ff8fab,#ffc107); background-size:200% 200%; animation:gradShift 3s ease infinite; color:#fff; box-shadow:0 4px 16px rgba(255,107,157,0.4); font-size:1.1rem; padding:14px 40px; }
  @keyframes gradShift { 0%,100%{background-position:0% 50%} 50%{background-position:100% 50%} }
  .btn-primary:hover:not(:disabled) { transform:translateY(-2px) scale(1.03); }
  .btn-primary:disabled { cursor:not-allowed; }
  .btn-threads { background:#000; color:#fff; box-shadow:0 3px 12px rgba(0,0,0,0.25); padding:12px 32px; }
  .btn-threads:hover { transform:translateY(-2px); }
  .btn-save { background:linear-gradient(135deg,#4ecdc4,#44b09e); color:#fff; box-shadow:0 3px 12px rgba(78,205,196,0.35); padding:12px 32px; }
  .btn-save:hover { transform:translateY(-2px); }
  .btn-back { background:none; color:#ccc; padding:8px 24px; font-size:0.8rem; text-decoration:underline; }

  /* ===== STAMP CARD ===== */
  .stamp-card { background:#fff; border-radius:20px; padding:16px; margin-top:1rem; box-shadow:0 4px 20px rgba(0,0,0,0.06); }
  .stamp-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
  .stamp-month { font-size:1rem; font-weight:900; color:var(--text); }
  .stamp-nav { display:flex; gap:0.3rem; }
  .stamp-nav button { border:none; background:var(--primary-light); color:var(--primary); border-radius:50%; width:28px; height:28px; font-size:0.9rem; cursor:pointer; font-family:inherit; font-weight:700; transition:background 0.2s; }
  .stamp-nav button:hover { background:var(--primary); color:#fff; }
  .stamp-weekdays { display:grid; grid-template-columns:repeat(7,1fr); gap:2px; margin-bottom:4px; }
  .stamp-weekdays span { font-size:0.65rem; color:#bbb; text-align:center; padding:2px 0; }
  .stamp-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:3px; }
  .stamp-day { aspect-ratio:1; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:0.7rem; color:#999; position:relative; background:#fafafa; border:1.5px solid #e0e0e0; transition:background 0.2s; overflow:hidden; }
  .stamp-day.has-stamp { color:#333; border-color:#ccc; }
  .stamp-day.today { outline:2.5px solid var(--primary); outline-offset:-1px; border-color:transparent; }
  .stamp-day .day-num { font-weight:800; font-size:0.75rem; line-height:1; position:relative; z-index:2; }
  .stamp-day .hanamaru { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; z-index:1; }
  .stamp-day .hanamaru.stamps-2 { gap:0; }
  .stamp-day .hanamaru.stamps-3 { flex-wrap:wrap; gap:0; align-content:center; }
  .stamp-day .hanamaru .hana-item { display:flex; line-height:0; }
  .stamp-day.empty { background:transparent; }
  .stamp-legend { display:flex; gap:0.8rem; justify-content:center; margin-top:8px; font-size:0.65rem; color:#aaa; }

  /* ===== CELEBRATION ===== */
  .celebration { position:fixed; inset:0; display:none; flex-direction:column; align-items:center; justify-content:center; z-index:100; padding:2rem; overflow:hidden; }
  .celebration.show { display:flex; }
  .celeb-bg { position:absolute; inset:0; animation:celebBgIn 0.6s ease-out both; }
  @keyframes celebBgIn { from{opacity:0;transform:scale(0);border-radius:50%} to{opacity:1;transform:scale(1);border-radius:0} }
  .celeb-content { position:relative; z-index:1; display:flex; flex-direction:column; align-items:center; }
  .celeb-crown { font-size:3rem; animation:crownBounce 1s ease-in-out infinite; margin-bottom:-10px; }
  @keyframes crownBounce { 0%,100%{transform:translateY(0) rotate(-5deg)} 50%{transform:translateY(-8px) rotate(5deg)} }
  .celeb-avatar { width:140px; height:140px; border-radius:50%; border:5px solid #fff; overflow:hidden; animation:avatarPop 0.6s 0.2s cubic-bezier(0.34,1.56,0.64,1) both; box-shadow:0 0 0 4px var(--accent),0 0 50px rgba(255,193,7,0.4); margin-bottom:1rem; }
  .celeb-avatar img { width:100%; height:100%; object-fit:cover; }
  @keyframes avatarPop { from{transform:scale(0) rotate(-20deg);opacity:0} to{transform:scale(1) rotate(0);opacity:1} }
  .celeb-title { font-size:2rem; font-weight:900; color:#fff; text-shadow:0 2px 16px rgba(0,0,0,0.15); margin-bottom:0.3rem; animation:slideUp 0.5s 0.4s both; }
  .celeb-activity-label { font-size:0.95rem; color:rgba(255,255,255,0.85); font-weight:700; margin-bottom:0.8rem; animation:slideUp 0.5s 0.5s both; }
  .celeb-stamp-added { font-size:1.2rem; color:#fff; animation:slideUp 0.5s 0.6s both; background:rgba(255,255,255,0.2); border-radius:20px; padding:6px 20px; margin-bottom:1.5rem; backdrop-filter:blur(4px); }
  .celeb-btns { display:flex; flex-direction:column; align-items:center; gap:0.5rem; animation:slideUp 0.5s 0.8s both; }
  @keyframes slideUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }

  .stars-burst { position:absolute; top:50%; left:50%; width:0; height:0; z-index:0; }
  #confetti { position:fixed; inset:0; z-index:101; pointer-events:none; }
  .sound-toggle { position:fixed; top:0.8rem; right:0.8rem; background:rgba(255,255,255,0.8); border:none; font-size:1.2rem; cursor:pointer; opacity:0.5; transition:opacity 0.2s; z-index:200; border-radius:50%; width:36px; height:36px; display:flex; align-items:center; justify-content:center; }
  .sound-toggle:hover { opacity:1; }
  #cardCanvas { display:none; }
</style>
</head>

<div class="container">

      <button class="btn btn-back" onclick="closeCelebration()">戻る</button>

</div>

<canvas id="confetti"></canvas>
<canvas id="cardCanvas" width="1080" height="1350"></canvas>

// --- Hanamaru (花丸) stamp ---
function hanamaruSVG(color, size = 32) {
  return `<svg width="${size}" height="${size}" viewBox="0 0 100 100" style="filter:drop-shadow(0 0 1px ${color}44)">
    <circle cx="50" cy="55" r="28" fill="none" stroke="${color}" stroke-width="5" opacity="0.8" stroke-linecap="round"/>
    <ellipse cx="30" cy="30" rx="9" ry="6.5" fill="none" stroke="${color}" stroke-width="3.5" opacity="0.8" transform="rotate(-40,30,30)"/>
    <ellipse cx="40" cy="20" rx="9" ry="6.5" fill="none" stroke="${color}" stroke-width="3.5" opacity="0.8" transform="rotate(-15,40,20)"/>
    <ellipse cx="52" cy="16" rx="9" ry="6.5" fill="none" stroke="${color}" stroke-width="3.5" opacity="0.8"/>
    <ellipse cx="64" cy="20" rx="9" ry="6.5" fill="none" stroke="${color}" stroke-width="3.5" opacity="0.8" transform="rotate(15,64,20)"/>
    <ellipse cx="72" cy="30" rx="9" ry="6.5" fill="none" stroke="${color}" stroke-width="3.5" opacity="0.8" transform="rotate(40,72,30)"/>
  </svg>`;
}

function drawHanamaru(ctx, cx, cy, r, color) {
  ctx.save();
  ctx.strokeStyle = color;
  ctx.lineCap = 'round';
  ctx.globalAlpha = 0.8;
  // Main circle
  ctx.lineWidth = r * 0.16;
  ctx.beginPath();
  ctx.arc(cx, cy + r * 0.12, r, 0, Math.PI * 2);
  ctx.stroke();
  // 5 petals at top
  const petalW = r * 0.32, petalH = r * 0.22;
  ctx.lineWidth = r * 0.12;
  const angles = [-0.7, -0.3, 0, 0.3, 0.7];
  const radii = [1.15, 1.28, 1.35, 1.28, 1.15];
  angles.forEach((a, i) => {
    const px = cx + Math.sin(a) * r * radii[i];
    const py = cy - Math.cos(a) * r * radii[i];
    ctx.beginPath();
    ctx.save();
    ctx.translate(px, py);
    ctx.rotate(a * 0.7);
    ctx.ellipse(0, 0, petalW, petalH, 0, 0, Math.PI * 2);
    ctx.restore();
    ctx.stroke();
  });
  ctx.restore();
}

// --- Stamp data: { "2026-03": { "06": ["morning","afternoon"], "07": ["evening"] } } ---
function loadStamps() {
  const raw = localStorage.getItem('katsuStamps');
  return raw ? JSON.parse(raw) : {};
}
function saveStamps(s) { localStorage.setItem('katsuStamps', JSON.stringify(s)); }

function addStamp(dateStr, type) {
  const stamps = loadStamps();
  const [y, m, d] = dateStr.split('-');
  const key = `${y}-${m}`;
  if (!stamps[key]) stamps[key] = {};
  if (!stamps[key][d]) stamps[key][d] = [];
  if (!stamps[key][d].includes(type)) stamps[key][d].push(type);
  saveStamps(stamps);
}

function getMonthStamps(year, month) {
  const stamps = loadStamps();
  const key = `${year}-${String(month).padStart(2,'0')}`;
  return stamps[key] || {};
}

function countTotalStamps() {
  const stamps = loadStamps();
  let total = 0;
  for (const month of Object.values(stamps)) {
    for (const day of Object.values(month)) total += day.length;
  }
  return total;
}

// --- Stamp card rendering ---
function renderStampCard() {
  const grid = document.getElementById('stampGrid');
  const monthLabel = document.getElementById('stampMonth');
  const card = document.querySelector('.stamp-card');
  const year = viewYear, month = viewMonth;
  const stamps = getMonthStamps(year, month);
  const season = SEASON[month];
  const today = new Date();
  const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

  monthLabel.textContent = `${season.emoji} ${year}年${month}月 ${season.emoji}`;
  card.style.background = season.bg;
  card.style.borderTop = `3px solid ${season.color}`;

  // Update CSS custom properties for stamp colors
  document.documentElement.style.setProperty('--stamp-color', season.color);
  document.documentElement.style.setProperty('--stamp-bg', season.bg);

  const firstDay = new Date(year, month - 1, 1).getDay();
  const daysInMonth = new Date(year, month, 0).getDate();

  let html = '';
  // Empty cells for alignment
  for (let i = 0; i < firstDay; i++) html += '<div class="stamp-day empty"></div>';

  for (let d = 1; d <= daysInMonth; d++) {
    const dayKey = String(d).padStart(2, '0');
    const dayStamps = stamps[dayKey] || [];
    const dateCheck = `${year}-${String(month).padStart(2,'0')}-${dayKey}`;
    const isToday = dateCheck === todayStr;
    const hasStamp = dayStamps.length > 0;

    const stampStyle = hasStamp ? `background:${season.color}08;` : '';
    const todayStyle = isToday ? `outline-color:${season.color};` : '';
    const n = dayStamps.length;
    const sz = n >= 3 ? 20 : n === 2 ? 24 : 34;
    const layoutClass = n >= 3 ? 'stamps-3' : n === 2 ? 'stamps-2' : 'stamps-1';

    let stampHtml = '';
    if (hasStamp) {
      for (let si = 0; si < n; si++) {
        const rot = ((d * 7 + si * 13 + month * 3) % 25 - 12);
        stampHtml += `<span class="hana-item" style="transform:rotate(${rot}deg)">${hanamaruSVG(season.color, sz)}</span>`;
      }
    }

    html += `<div class="stamp-day${hasStamp ? ' has-stamp' : ''}${isToday ? ' today' : ''}" style="${stampStyle}${todayStyle}">
      <span class="day-num">${d}</span>
      ${hasStamp ? `<span class="hanamaru ${layoutClass}">${stampHtml}</span>` : ''}
    </div>`;
  }
  grid.innerHTML = html;
  document.getElementById('stampLegend').innerHTML = `<span>${hanamaruSVG(season.color, 16)} = 活動した日</span>`;
}

function changeMonth(delta) {
  viewMonth += delta;
  if (viewMonth > 12) { viewMonth = 1; viewYear++; }
  if (viewMonth < 1) { viewMonth = 12; viewYear--; }
  renderStampCard();
}

// --- Avatar ---
document.getElementById('avatarInput').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    avatarDataUrl = ev.target.result;
    localStorage.setItem('katsuAvatar', avatarDataUrl);

  };

});
function showAvatar() { if (avatarDataUrl) document.getElementById('avatarCircle').innerHTML = `<img src="${avatarDataUrl}" alt="icon">`; }
function loadAvatarImg() { if (!avatarDataUrl) return; avatarImg = new Image(); avatarImg.src = avatarDataUrl; }
const savedAvatar = localStorage.getItem('katsuAvatar');
if (savedAvatar) { avatarDataUrl = savedAvatar; loadAvatarImg(); showAvatar(); }

// --- Activity selector ---
function selectActivity(btn) {
  document.querySelectorAll('.act-btn').forEach(b => b.classList.remove('active-morning','active-afternoon','active-evening'));
  selectedType = btn.dataset.type;
  btn.classList.add('active-' + selectedType);
  document.getElementById('completeBtn').disabled = false;
  document.getElementById('completeBtn').style.opacity = '1';
}

// --- Complete ---
function completeActivity() {
  if (!selectedType) return;
  const dateVal = document.getElementById('dateInput').value;
  addStamp(dateVal, selectedType);
  renderStampCard();
  playSound();
  showCelebration(dateVal);
}

// --- Celebration ---
function showCelebration(dateVal) {
  const config = CFG[selectedType];
  const dateStr = dateVal.replace(/-/g, '.');
  const now = new Date();
  const timeStr = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  const total = countTotalStamps();

  lastCelebData = { config, dateStr, timeStr, type: selectedType, total, dateVal };

  document.getElementById('celebBg').style.background = config.grad;
  document.getElementById('celebCrown').textContent = config.crown;

  const avatarEl = document.getElementById('celebAvatar');
  if (avatarDataUrl) { avatarEl.innerHTML = `<img src="${avatarDataUrl}" alt="icon">`; avatarEl.style.display = ''; }
  else { avatarEl.style.display = 'none'; }

  document.getElementById('celebTitle').textContent = `${config.label}に参加しました!`;
  document.getElementById('celebActivity').textContent = `${dateStr} ${timeStr}`;
  document.getElementById('celebStamp').textContent = `\u{1F3C5} スタンプ ${total}個目!`;

  // Stars burst
  const burst = document.getElementById('starsBurst');
  burst.innerHTML = '';
  const stars = ['\u{2B50}','\u{2728}','\u{1F31F}','\u{1F3C5}','\u{1F389}','\u{1FA77}'];
  for (let i = 0; i < 12; i++) {
    const s = document.createElement('span');
    s.textContent = stars[i % stars.length];
    s.style.position = 'absolute'; s.style.fontSize = '1.5rem';
    const angle = (i / 12) * Math.PI * 2;
    const dist = 120 + Math.random() * 80;
    s.animate([
      { transform:'translate(0,0) scale(0) rotate(0deg)', opacity:1 },
      { transform:`translate(${Math.cos(angle)*dist}px,${Math.sin(angle)*dist}px) scale(1.5) rotate(${360+Math.random()*180}deg)`, opacity:0 },
    ], { duration:1200, delay:i*80, easing:'ease-out', fill:'both' });
    burst.appendChild(s);
  }

  document.getElementById('celebration').classList.add('show');
  launchConfetti(config.color1);
}

function closeCelebration() {
  document.getElementById('celebration').classList.remove('show');
  document.querySelectorAll('.act-btn').forEach(b => b.classList.remove('active-morning','active-afternoon','active-evening'));
  selectedType = null;
  document.getElementById('completeBtn').disabled = true;
  document.getElementById('completeBtn').style.opacity = '0.4';
}

// --- Threads intent ---
function shareToThreads() {
  const { config, dateStr } = lastCelebData;
  const text = `${config.label}しました!\n${dateStr}`;
  window.open(`https://www.threads.net/intent/post?text=${encodeURIComponent(text)}`, '_blank');
}

// --- Card image: stamp card style ---
function renderCard() {
  const { config, dateStr, timeStr, total, dateVal } = lastCelebData;
  const canvas = document.getElementById('cardCanvas');
  const ctx = canvas.getContext('2d');
  const W = 1080, H = 1350;
  const cx = W / 2;

  // Parse month from dateVal
  const [yr, mo] = dateVal.split('-');
  const year = parseInt(yr), month = parseInt(mo);
  const stamps = getMonthStamps(year, month);

  // Background
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, W, H);

  const season = SEASON[month];

  // Top color bar - season themed
  const topGrad = ctx.createLinearGradient(0, 0, W, 0);
  topGrad.addColorStop(0, season.color);
  topGrad.addColorStop(1, config.color1);
  ctx.fillStyle = topGrad;
  roundRect(ctx, 0, 0, W, 200, 0);
  ctx.fill();

  // Avatar in top bar
  if (avatarImg && avatarImg.complete && avatarImg.naturalWidth > 0) {
    const ar = 50;
    ctx.beginPath(); ctx.arc(80, 100, ar + 3, 0, Math.PI * 2);
    ctx.fillStyle = '#fff';
    ctx.fill();
    ctx.save();
    ctx.beginPath(); ctx.arc(80, 100, ar, 0, Math.PI * 2); ctx.clip();
    const imgSize = Math.max(avatarImg.naturalWidth, avatarImg.naturalHeight);
    ctx.drawImage(avatarImg, (avatarImg.naturalWidth-imgSize)/2, (avatarImg.naturalHeight-imgSize)/2, imgSize, imgSize, 80-ar, 100-ar, ar*2, ar*2);
    ctx.restore();
  }

  // Title in top bar
  ctx.textAlign = 'center';
  ctx.font = '900 48px "Zen Maru Gothic","Hiragino Sans","Meiryo",sans-serif';
  ctx.fillStyle = '#fff';
  ctx.fillText(`${config.label}に参加しました!`, cx + 20, 90);

  ctx.font = '28px "Zen Maru Gothic","Hiragino Sans","Meiryo",sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.8)';
  ctx.fillText(`${dateStr}  ${timeStr}`, cx + 20, 140);

  // Medal + stamp count
  ctx.font = '36px "Segoe UI Emoji","Apple Color Emoji",sans-serif';
  ctx.fillText('\u{1F3C5}', cx, 260);
  ctx.font = 'bold 28px "Zen Maru Gothic","Hiragino Sans","Meiryo",sans-serif';
  ctx.fillStyle = config.color1;
  ctx.fillText(`${total}個目のスタンプ!`, cx, 310);

  // --- Stamp card grid ---
  const gridTop = 360;
  const cellSize = 120;
  const gap = 8;
  const gridW = 7 * cellSize + 6 * gap;
  const gridLeft = (W - gridW) / 2;

  // Month label with season emoji
  ctx.font = '36px "Segoe UI Emoji","Apple Color Emoji",sans-serif';
  ctx.fillText(season.emoji, cx - 160, gridTop - 5);
  ctx.fillText(season.emoji, cx + 160, gridTop - 5);
  ctx.font = 'bold 32px "Zen Maru Gothic","Hiragino Sans","Meiryo",sans-serif';
  ctx.fillStyle = season.color;
  ctx.fillText(`${year}年${month}月`, cx, gridTop - 10);

  // Weekday headers
  const weekdays = ['日','月','火','水','木','金','土'];
  ctx.font = 'bold 20px "Zen Maru Gothic","Hiragino Sans","Meiryo",sans-serif';
  ctx.fillStyle = '#aaa';
  for (let i = 0; i < 7; i++) {
    ctx.fillText(weekdays[i], gridLeft + i * (cellSize + gap) + cellSize / 2, gridTop + 25);
  }

  const firstDay = new Date(year, month - 1, 1).getDay();
  const daysInMonth = new Date(year, month, 0).getDate();
  const rowTop = gridTop + 45;

  for (let d = 1; d <= daysInMonth; d++) {
    const idx = firstDay + d - 1;
    const col = idx % 7;
    const row = Math.floor(idx / 7);
    const x = gridLeft + col * (cellSize + gap);
    const y = rowTop + row * (cellSize + gap);
    const dayKey = String(d).padStart(2, '0');
    const dayStamps = stamps[dayKey] || [];

    // Cell background
    if (dayStamps.length > 0) {
      ctx.fillStyle = season.color + '15';
    } else {
      ctx.fillStyle = '#f8f8f8';
    }
    roundRect(ctx, x, y, cellSize, cellSize, 12);
    ctx.fill();

    // Cell border
    ctx.strokeStyle = dayStamps.length > 0 ? '#ccc' : '#e0e0e0';
    ctx.lineWidth = 1.5;
    roundRect(ctx, x, y, cellSize, cellSize, 12);
    ctx.stroke();

    // Today highlight
    if (dateVal === `${year}-${String(month).padStart(2,'0')}-${dayKey}`) {
      ctx.strokeStyle = season.color;
      ctx.lineWidth = 3;
      roundRect(ctx, x, y, cellSize, cellSize, 12);
      ctx.stroke();
    }

    // Day number
    ctx.font = 'bold 24px "Zen Maru Gothic","Hiragino Sans","Meiryo",sans-serif';
    ctx.fillStyle = dayStamps.length > 0 ? '#222' : '#bbb';
    ctx.fillText(String(d), x + cellSize / 2, y + 35);

    // Hanamaru stamps (1-3 per day)
    const n = dayStamps.length;
    if (n > 0) {
      const cx0 = x + cellSize / 2, cy0 = y + cellSize / 2 + 4;
      const positions = n === 1
        ? [[0, 0, cellSize * 0.35]]
        : n === 2
        ? [[-cellSize * 0.2, 0, cellSize * 0.24], [cellSize * 0.2, 0, cellSize * 0.24]]
        : [[-cellSize * 0.2, -cellSize * 0.12, cellSize * 0.2], [cellSize * 0.2, -cellSize * 0.12, cellSize * 0.2], [0, cellSize * 0.18, cellSize * 0.2]];
      positions.forEach(([dx, dy, r], si) => {
        ctx.save();
        const rot = ((d * 7 + si * 13 + month * 3) % 25 - 12) * Math.PI / 180;
        ctx.translate(cx0 + dx, cy0 + dy);
        ctx.rotate(rot);
        drawHanamaru(ctx, 0, 0, r, season.color);
        ctx.restore();
      });
    }
  }

  // Footer
  const footY = H - 60;
  ctx.strokeStyle = '#eee'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(cx - 200, footY - 30); ctx.lineTo(cx + 200, footY - 30); ctx.stroke();
  ctx.font = '20px "Zen Maru Gothic","Hiragino Sans","Meiryo",sans-serif';
  ctx.fillStyle = '#ccc';
  ctx.fillText('katsu-celebration', cx, footY);

  return canvas;
}

async function downloadCard() {
  const canvas = renderCard();
  const blob = await new Promise(r => canvas.toBlob(r, 'image/png'));
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.download = `${lastCelebData.dateStr.replace(/\./g,'-')}_${lastCelebData.config.label}_stamp.png`;
  link.href = url;
  link.click();
  URL.revokeObjectURL(url);
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath(); ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h); ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r); ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
}

// --- Confetti ---
function launchConfetti(themeColor) {
  const canvas = document.getElementById('confetti');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  const colors = [themeColor,'#ffc107','#ff6b9d','#a8e6cf','#fddb92','#f8b4d9','#88d8ff','#b28dff'];
  const particles = [];
  for (let i = 0; i < 150; i++) {
    particles.push({ x:canvas.width/2+(Math.random()-0.5)*300, y:canvas.height*0.5+(Math.random()-0.5)*100,
      vx:(Math.random()-0.5)*18, vy:-Math.random()*20-5, color:colors[Math.floor(Math.random()*colors.length)],
      size:Math.random()*9+4, rotation:Math.random()*360, rotSpeed:(Math.random()-0.5)*12,
      gravity:0.25+Math.random()*0.2, opacity:1, shape:['rect','circle'][Math.floor(Math.random()*2)] });
  }
  let frame = 0;
  function animate() {
    ctx.clearRect(0,0,canvas.width,canvas.height); let alive = false;
    for (const p of particles) {
      p.x+=p.vx; p.vy+=p.gravity; p.y+=p.vy; p.rotation+=p.rotSpeed; p.vx*=0.99;
      if (frame>70) p.opacity-=0.013; if (p.opacity<=0) continue; alive=true;
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rotation*Math.PI/180);
      ctx.globalAlpha=Math.max(0,p.opacity); ctx.fillStyle=p.color;
      if (p.shape==='rect') ctx.fillRect(-p.size/2,-p.size/4,p.size,p.size/2);
      else { ctx.beginPath(); ctx.arc(0,0,p.size/2,0,Math.PI*2); ctx.fill(); }
      ctx.restore();
    }
    frame++; if (alive&&frame<220) requestAnimationFrame(animate);
    else ctx.clearRect(0,0,canvas.width,canvas.height);
  }
  animate();
}

// --- Sound ---
function playSound() {
  if (!soundOn) return;
  try {
    const ac = new (window.AudioContext||window.webkitAudioContext)();
    const notes=[523.25,659.25,783.99,1046.5,1318.5,1046.5,1318.5];
    const times=[0,0.12,0.24,0.4,0.52,0.7,0.82];
    const durs=[0.3,0.3,0.3,0.5,0.5,0.3,0.6];
    notes.forEach((freq,i) => {
      const osc=ac.createOscillator(), gain=ac.createGain();
      osc.connect(gain); gain.connect(ac.destination);
      osc.frequency.value=freq; osc.type=i<3?'triangle':'sine';
      gain.gain.setValueAtTime(0,ac.currentTime+times[i]);
      gain.gain.linearRampToValueAtTime(0.12,ac.currentTime+times[i]+0.04);
      gain.gain.linearRampToValueAtTime(0,ac.currentTime+times[i]+durs[i]);
      osc.start(ac.currentTime+times[i]); osc.stop(ac.currentTime+times[i]+durs[i]+0.1);
    });
  } catch(e){}
}
document.getElementById('soundToggle').addEventListener('click', () => {
  soundOn=!soundOn;
  document.getElementById('soundToggle').textContent=soundOn?'\u{1F50A}':'\u{1F507}';
});
